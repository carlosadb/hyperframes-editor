<template id="scene7-outro-template">
  <div
    data-composition-id="scene7-outro"
    data-start="0"
    data-duration="3.5"
    data-width="1920"
    data-height="1080"
  >
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;900&family=Roboto+Mono:wght@400;500;700&display=block"
    />

    <div class="s7-root">
      <!-- Radial glow bed -->
      <div class="s7-bed"></div>

      <!-- Logo -->
      <div class="s7-logo-wrap shimmer-sweep-target">
        <img class="s7-logo" src="assets/AIS Logo PNG.png" alt="AIS" />
      </div>

      <!-- Coming Soon -->
      <div class="s7-coming">
        <span class="s7-c-w">COMING</span>
        <span class="s7-c-w">SOON.</span>
      </div>

      <!-- URL pill -->
      <div class="s7-pill">
        <span class="s7-arrow">▸</span>
        <span class="s7-url">AIAUTOMATIONSOCIETY.AI</span>
        <span class="s7-cursor">|</span>
      </div>

      <!-- Tagline below -->
      <div class="s7-tag">MASTER AI AUTOMATION.</div>
    </div>

    <style>
      [data-composition-id="scene7-outro"] {
        position: absolute;
        inset: 0;
        background: transparent;
        overflow: hidden;
        font-family: "Montserrat", sans-serif;
      }
      [data-composition-id="scene7-outro"] .s7-root {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 34px;
      }
      [data-composition-id="scene7-outro"] .s7-bed {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 1200px;
        height: 800px;
        background: radial-gradient(circle at center, rgba(55, 189, 248, 0.35) 0%, transparent 60%);
        filter: blur(40px);
        pointer-events: none;
      }
      [data-composition-id="scene7-outro"] .s7-logo-wrap {
        position: relative;
      }
      [data-composition-id="scene7-outro"] .s7-logo {
        width: 280px;
        height: 280px;
        object-fit: contain;
        filter: drop-shadow(0 0 40px rgba(3, 7, 255, 0.75))
          drop-shadow(0 0 100px rgba(55, 189, 248, 0.55));
      }
      [data-composition-id="scene7-outro"] .s7-coming {
        display: flex;
        gap: 24px;
        line-height: 0.95;
      }
      [data-composition-id="scene7-outro"] .s7-c-w {
        font-weight: 900;
        font-size: 92px;
        color: #ffffff;
        letter-spacing: 0.12em;
        text-shadow: 0 0 36px rgba(55, 189, 248, 0.35);
      }
      [data-composition-id="scene7-outro"] .s7-pill {
        display: inline-flex;
        align-items: center;
        gap: 14px;
        background: rgba(13, 32, 49, 0.9);
        border: 1.5px solid #37bdf8;
        border-radius: 999px;
        padding: 16px 34px;
        box-shadow: 0 0 28px rgba(55, 189, 248, 0.55);
      }
      [data-composition-id="scene7-outro"] .s7-arrow {
        font-family: "Roboto Mono", monospace;
        font-size: 30px;
        color: #37bdf8;
      }
      [data-composition-id="scene7-outro"] .s7-url {
        font-family: "Roboto Mono", monospace;
        font-weight: 700;
        font-size: 32px;
        color: #ffffff;
        letter-spacing: 0.08em;
      }
      [data-composition-id="scene7-outro"] .s7-cursor {
        font-family: "Roboto Mono", monospace;
        font-size: 30px;
        color: #37bdf8;
        width: 12px;
        display: inline-block;
      }
      [data-composition-id="scene7-outro"] .s7-tag {
        font-family: "Roboto Mono", monospace;
        font-weight: 500;
        font-size: 22px;
        color: #96a2b6;
        letter-spacing: 0.3em;
        margin-top: 6px;
      }

      /* Inlined shimmer-sweep styles */
      [data-composition-id="scene7-outro"] .shimmer-sweep-target {
        position: relative;
        display: inline-block;
      }
      [data-composition-id="scene7-outro"] .shimmer-sweep-target .shimmer-mask {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        background: linear-gradient(
          120deg,
          transparent 0%,
          transparent calc(var(--shimmer-pos, -20%) - 10%),
          rgba(255, 255, 255, 0.65) var(--shimmer-pos, -20%),
          transparent calc(var(--shimmer-pos, -20%) + 10%),
          transparent 100%
        );
        mix-blend-mode: overlay;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true, defaults: { ease: "power3.out" } });
        const root = '[data-composition-id="scene7-outro"]';

        // Auto-inject shimmer masks
        document.querySelectorAll(root + ' .shimmer-sweep-target').forEach((el) => {
          if (!el.querySelector('.shimmer-mask')) {
            const mask = document.createElement('div');
            mask.className = 'shimmer-mask';
            el.appendChild(mask);
          }
        });

        // Initial states
        tl.set(root + " .s7-coming", { autoAlpha: 0 }, 0);
        tl.set(root + " .s7-pill", { autoAlpha: 0, scale: 0 }, 0);
        tl.set(root + " .s7-tag", { autoAlpha: 0 }, 0);

        // Radial bed fades up
        tl.from(root + " .s7-bed", {
          autoAlpha: 0,
          scale: 0.6,
          duration: 0.6,
          ease: "power2.out",
        }, 0);

        // Logo slam
        tl.fromTo(root + " .s7-logo-wrap",
          { scale: 1.45, autoAlpha: 0, filter: "blur(12px)" },
          { scale: 1, autoAlpha: 1, filter: "blur(0px)", duration: 0.55, ease: "back.out(1.7)" },
          0.15
        );

        // COMING SOON word stagger
        tl.to(root + " .s7-coming", { autoAlpha: 1, duration: 0.01 }, 0.7);
        tl.from(root + " .s7-c-w", {
          y: 40,
          autoAlpha: 0,
          duration: 0.5,
          ease: "power4.out",
          stagger: 0.1,
        }, 0.7);

        // URL pill slam in
        tl.to(root + " .s7-pill", { autoAlpha: 1, duration: 0.01 }, 1.3);
        tl.to(root + " .s7-pill", {
          scale: 1,
          duration: 0.45,
          ease: "back.out(1.5)",
        }, 1.3);

        // Cursor blink (finite, softened from steps strobe to sine pulse)
        tl.to(root + " .s7-cursor",
          { autoAlpha: 0.25, duration: 0.7, ease: "sine.inOut", repeat: 3, yoyo: true },
          1.8
        );

        // Tagline fade in
        tl.to(root + " .s7-tag", { autoAlpha: 1, duration: 0.01 }, 1.7);
        tl.from(root + " .s7-tag", {
          y: 10,
          autoAlpha: 0,
          duration: 0.4,
          ease: "power2.out",
        }, 1.7);

        // Shimmer sweep over logo at t=2.0
        tl.fromTo(root + " .shimmer-sweep-target",
          { "--shimmer-pos": "-30%" },
          { "--shimmer-pos": "130%", duration: 1.3, ease: "power2.inOut" },
          2.0
        );

        // Subtle logo glow throb for held finale (finite, 2 cycles)
        tl.to(root + " .s7-logo", {
          filter: "drop-shadow(0 0 60px rgba(3, 7, 255, 0.9)) drop-shadow(0 0 140px rgba(55, 189, 248, 0.7))",
          duration: 0.8,
          ease: "sine.inOut",
          repeat: 1,
          yoyo: true,
        }, 2.2);

        // Pad
        tl.to({}, { duration: 3.5 }, 0);

        window.__timelines["scene7-outro"] = tl;
      })();
    </script>
  </div>
</template>
