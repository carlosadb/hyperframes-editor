    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true, defaults: { ease: "power3.out" } });
        const root = '[data-composition-id="scene4-showcase"]';

        // Title — per-word in
        tl.from(root + " .s4-title-w", {
          y: 30,
          autoAlpha: 0,
          duration: 0.5,
          ease: "back.out(1.3)",
          stagger: 0.1,
        }, 0.1);

        // Phones enter via rotationY stagger
        tl.set(root + " .s4-phone", { autoAlpha: 0 }, 0);

        tl.fromTo(root + " .s4-phone-l",
          { rotationY: 90, autoAlpha: 0, scale: 0.6 },
          { rotationY: 14, autoAlpha: 1, scale: 1, duration: 1.1, ease: "expo.out" },
          0.35
        );
        tl.fromTo(root + " .s4-phone-c",
          { rotationY: 60, autoAlpha: 0, scale: 0.6 },
          { rotationY: 0, autoAlpha: 1, scale: 1.06, duration: 1.2, ease: "expo.out" },
          0.5
        );
        tl.fromTo(root + " .s4-phone-r",
          { rotationY: -90, autoAlpha: 0, scale: 0.6 },
          { rotationY: -14, autoAlpha: 1, scale: 1, duration: 1.1, ease: "expo.out" },
          0.65
        );

        // Labels drop in after phones settle
        tl.from(root + " .s4-phone-label", {
          y: -20,
          autoAlpha: 0,
          duration: 0.5,
          ease: "power3.out",
          stagger: 0.12,
        }, 1.5);

        // Live pill pulse on Left phone
        tl.to(root + " .s4-call-pill",
          { scale: 1.08, boxShadow: "0 0 14px rgba(55,189,248,0.9)", duration: 0.7, ease: "sine.inOut", repeat: 3, yoyo: true },
          2.0
        );

        // Feed cards subtle entrance stagger (inside center phone)
        tl.from(root + " .s4-feed-card", {
          x: 20,
          autoAlpha: 0,
          duration: 0.4,
          ease: "power2.out",
          stagger: 0.1,
        }, 1.8);

        // Rank rows cascade
        tl.from(root + " .s4-rank-row", {
          x: -20,
          autoAlpha: 0,
          duration: 0.35,
          ease: "power2.out",
          stagger: 0.07,
        }, 1.8);

        // Gold prize glow pulse
        tl.to(root + " .s4-prize-gold",
          { textShadow: "0 0 24px rgba(240,144,37,1)", duration: 1.0, ease: "sine.inOut", repeat: 2, yoyo: true },
          2.5
        );

        // Subtle float loop on each phone (finite, phase-offset)
        tl.to(root + " .s4-phone-l", { y: -8, duration: 1.6, ease: "sine.inOut", repeat: 2, yoyo: true }, 2.0);
        tl.to(root + " .s4-phone-c", { y: -10, duration: 1.6, ease: "sine.inOut", repeat: 2, yoyo: true }, 2.5);
        tl.to(root + " .s4-phone-r", { y: -8, duration: 1.6, ease: "sine.inOut", repeat: 2, yoyo: true }, 3.0);

        // Pad
        tl.to({}, { duration: 6 }, 0);

        window.__timelines["scene4-showcase"] = tl;
      })();
