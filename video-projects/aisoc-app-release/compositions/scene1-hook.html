<template id="scene1-hook-template">
  <div
    data-composition-id="scene1-hook"
    data-start="0"
    data-duration="3"
    data-width="1920"
    data-height="1080"
  >
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Roboto+Mono:wght@500;700&display=block"
    />

    <div class="s1-root">
      <!-- AIS logo lockup (boot) -->
      <div class="s1-logo-wrap">
        <img class="s1-logo" src="assets/AIS Logo PNG.png" alt="AIS" />
        <div class="s1-logo-ring"></div>
      </div>

      <!-- Headline -->
      <div class="s1-headline">
        <span class="s1-word">332,600</span>
        <span class="s1-word">BUILDERS.</span>
      </div>
      <div class="s1-sublabel">
        <span class="s1-dot"></span>AI AUTOMATION SOCIETY · EST 2024
      </div>

      <!-- Scan beam -->
      <div class="s1-scanbeam"></div>
    </div>

    <style>
      [data-composition-id="scene1-hook"] {
        position: absolute;
        inset: 0;
        background: transparent;
        overflow: hidden;
        font-family: "Montserrat", sans-serif;
      }
      [data-composition-id="scene1-hook"] .s1-root {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 44px;
      }
      [data-composition-id="scene1-hook"] .s1-logo-wrap {
        position: relative;
        width: 220px;
        height: 220px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      [data-composition-id="scene1-hook"] .s1-logo {
        width: 220px;
        height: 220px;
        object-fit: contain;
        filter: drop-shadow(0 0 24px rgba(3, 7, 255, 0.55))
          drop-shadow(0 0 60px rgba(55, 189, 248, 0.45));
        z-index: 2;
      }
      [data-composition-id="scene1-hook"] .s1-logo-ring {
        position: absolute;
        inset: -30px;
        border: 2px solid rgba(55, 189, 248, 0.35);
        border-radius: 50%;
        z-index: 1;
      }
      [data-composition-id="scene1-hook"] .s1-headline {
        display: flex;
        gap: 36px;
        line-height: 0.95;
      }
      [data-composition-id="scene1-hook"] .s1-word {
        font-family: "Montserrat", sans-serif;
        font-weight: 900;
        font-size: 140px;
        color: #ffffff;
        letter-spacing: -0.02em;
        text-shadow: 0 0 40px rgba(7, 18, 28, 0.9);
      }
      [data-composition-id="scene1-hook"] .s1-sublabel {
        font-family: "Roboto Mono", monospace;
        font-weight: 500;
        font-size: 20px;
        color: #37bdf8;
        letter-spacing: 0.22em;
        display: flex;
        align-items: center;
        gap: 14px;
      }
      [data-composition-id="scene1-hook"] .s1-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #37bdf8;
        box-shadow: 0 0 14px rgba(55, 189, 248, 0.9);
      }
      [data-composition-id="scene1-hook"] .s1-scanbeam {
        position: absolute;
        top: 0;
        left: -8%;
        width: 14%;
        height: 100%;
        background: linear-gradient(
          90deg,
          transparent 0%,
          rgba(55, 189, 248, 0.0) 20%,
          rgba(55, 189, 248, 0.45) 50%,
          rgba(55, 189, 248, 0.0) 80%,
          transparent 100%
        );
        filter: blur(2px);
        opacity: 0;
        pointer-events: none;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true, defaults: { ease: "power3.out" } });
        const root = '[data-composition-id="scene1-hook"]';

        // Initial states
        tl.set(root + " .s1-headline", { autoAlpha: 0 }, 0);
        tl.set(root + " .s1-sublabel", { autoAlpha: 0 }, 0);

        // Logo boot — scale in with glow ramp
        tl.from(root + " .s1-logo", {
          scale: 0.8,
          autoAlpha: 0,
          filter: "drop-shadow(0 0 0 rgba(3,7,255,0)) drop-shadow(0 0 0 rgba(55,189,248,0))",
          duration: 0.7,
          ease: "expo.out",
        }, 0.1);

        // Logo ring expands
        tl.from(root + " .s1-logo-ring", {
          scale: 0.5,
          autoAlpha: 0,
          duration: 0.6,
          ease: "power4.out",
        }, 0.2);

        // Headline words stagger in
        tl.to(root + " .s1-headline", { autoAlpha: 1, duration: 0.01 }, 1.0);
        tl.from(root + " .s1-word", {
          y: 60,
          autoAlpha: 0,
          scale: 0.94,
          duration: 0.5,
          ease: "back.out(1.6)",
          stagger: 0.08,
        }, 1.1);

        // Sublabel flicker in
        tl.to(root + " .s1-sublabel", { autoAlpha: 1, duration: 0.01 }, 1.7);
        tl.from(root + " .s1-sublabel", {
          x: -20,
          autoAlpha: 0,
          duration: 0.4,
          ease: "expo.out",
        }, 1.7);

        // Scan beam sweep
        tl.fromTo(root + " .s1-scanbeam",
          { x: "-14%", opacity: 1 },
          { x: "114%", opacity: 1, duration: 0.9, ease: "power2.inOut" },
          1.8
        );
        tl.to(root + " .s1-scanbeam", { opacity: 0, duration: 0.35, ease: "power2.out" }, 2.7);

        // Pad timeline
        tl.to({}, { duration: 3 }, 0);

        window.__timelines["scene1-hook"] = tl;
      })();
    </script>
  </div>
</template>
