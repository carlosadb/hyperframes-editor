<template id="scene6-instagram-template">
  <div
    data-composition-id="scene6-instagram"
    data-start="0"
    data-duration="4"
    data-width="1920"
    data-height="1080"
  >
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;900&family=Roboto+Mono:wght@400;500;700&family=DM+Sans:wght@400;700&display=block"
    />

    <div class="s6-root">
      <!-- Backdrop dim for ambient-bg -->
      <div class="s6-backdrop"></div>

      <!-- Top supporting header: "FOLLOW FOR UPDATES." + handle + accent line -->
      <div class="s6-top">
        <div class="s6-headline">
          <span class="s6-word">FOLLOW</span>
          <span class="s6-word">FOR</span>
          <span class="s6-word s6-word-accent">UPDATES.</span>
        </div>
        <div class="s6-handle">@aiautomationsociety</div>
        <svg class="s6-accent" viewBox="0 0 280 6">
          <line
            x1="0"
            y1="3"
            x2="280"
            y2="3"
            stroke="#37bdf8"
            stroke-width="3"
            stroke-linecap="round"
            class="s6-accent-line"
          />
        </svg>
      </div>

      <!-- HERO: big Instagram follow notification, centered -->
      <div id="s6-ig-card" class="s6-ig-card">
        <img class="s6-ig-avatar" src="assets/AIS Logo PNG.png" alt="AI Automation Society" />
        <div class="s6-ig-profile">
          <div class="s6-ig-name-row">
            <div class="s6-ig-name">AI Automation Society</div>
            <span class="s6-ig-badge">
              <svg viewBox="0 0 40 40" fill="none">
                <circle cx="20" cy="20" r="20" fill="#0095F6" />
                <path d="M17.5 27.5L10 20l2.5-2.5 5 5 10-10L30 15 17.5 27.5z" fill="#fff" />
              </svg>
            </span>
          </div>
          <div class="s6-ig-handle">@aiautomationsociety</div>
          <div class="s6-ig-followers">332K followers</div>
        </div>
        <div id="s6-follow-btn" class="s6-follow-btn">
          <span id="s6-btn-follow" class="s6-btn-text s6-btn-text-follow">Follow</span>
          <span id="s6-btn-following" class="s6-btn-text s6-btn-text-following">
            <span>Following</span>
            <span class="s6-chevron">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="#fff"
                stroke-width="3"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="6 9 12 15 18 9"></polyline>
              </svg>
            </span>
          </span>
        </div>
      </div>

      <!-- Bottom subtitle: small supporting copy -->
      <div class="s6-sub">
        Get launch alerts, behind-the-scenes drops, and member wins — on Instagram.
      </div>
    </div>

    <style>
      [data-composition-id="scene6-instagram"] {
        position: absolute;
        inset: 0;
        background: transparent;
        overflow: hidden;
        font-family: "Montserrat", sans-serif;
      }
      [data-composition-id="scene6-instagram"] .s6-root {
        position: absolute;
        inset: 0;
      }
      [data-composition-id="scene6-instagram"] .s6-backdrop {
        position: absolute;
        inset: 0;
        background: radial-gradient(
          ellipse at 50% 50%,
          rgba(7, 18, 28, 0.75) 0%,
          rgba(7, 18, 28, 0.45) 55%,
          rgba(7, 18, 28, 0.15) 100%
        );
        pointer-events: none;
      }

      /* Top supporting header */
      [data-composition-id="scene6-instagram"] .s6-top {
        position: absolute;
        top: 120px;
        left: 50%;
        transform: translateX(-50%);
        text-align: center;
      }
      [data-composition-id="scene6-instagram"] .s6-headline {
        display: flex;
        justify-content: center;
        gap: 20px;
        line-height: 0.95;
      }
      [data-composition-id="scene6-instagram"] .s6-word {
        font-weight: 900;
        font-size: 68px;
        letter-spacing: -0.02em;
        background: linear-gradient(180deg, #ffffff 0%, #b8c4d4 60%, #ffffff 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        text-shadow: 0 0 24px rgba(255, 255, 255, 0.35);
      }
      [data-composition-id="scene6-instagram"] .s6-word-accent {
        background: linear-gradient(180deg, #9edcff 0%, #37bdf8 50%, #1e8dc8 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        text-shadow: 0 0 32px rgba(55, 189, 248, 0.55);
      }
      [data-composition-id="scene6-instagram"] .s6-handle {
        font-family: "Roboto Mono", monospace;
        font-weight: 700;
        font-size: 28px;
        color: #37bdf8;
        letter-spacing: 0.04em;
        margin-top: 16px;
      }
      [data-composition-id="scene6-instagram"] .s6-accent {
        display: block;
        width: 240px;
        height: 6px;
        margin: 14px auto 0;
      }
      [data-composition-id="scene6-instagram"] .s6-accent-line {
        stroke-dasharray: 280;
        stroke-dashoffset: 280;
      }

      /* HERO card: big Instagram follow notification */
      [data-composition-id="scene6-instagram"] .s6-ig-card {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        display: flex;
        align-items: center;
        gap: 56px;
        background: #1a1a1a;
        border-radius: 140px;
        padding: 44px 72px 44px 44px;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.55), 0 0 80px rgba(55, 189, 248, 0.12);
        font-family: "DM Sans", sans-serif;
      }
      [data-composition-id="scene6-instagram"] .s6-ig-avatar {
        width: 220px;
        height: 220px;
        border-radius: 50%;
        object-fit: contain;
        background: #07121c;
        padding: 12px;
        flex-shrink: 0;
        border: 6px solid #37bdf8;
        box-shadow: 0 0 40px rgba(55, 189, 248, 0.35);
      }
      [data-composition-id="scene6-instagram"] .s6-ig-profile {
        display: flex;
        flex-direction: column;
        gap: 4px;
        margin-right: 32px;
      }
      [data-composition-id="scene6-instagram"] .s6-ig-name-row {
        display: flex;
        align-items: center;
        gap: 18px;
      }
      [data-composition-id="scene6-instagram"] .s6-ig-name {
        font-size: 64px;
        font-weight: 700;
        color: #ffffff;
        line-height: 1.2;
        letter-spacing: -0.01em;
        white-space: nowrap;
      }
      [data-composition-id="scene6-instagram"] .s6-ig-badge {
        width: 64px;
        height: 64px;
        flex-shrink: 0;
        display: inline-flex;
      }
      [data-composition-id="scene6-instagram"] .s6-ig-badge svg {
        width: 64px;
        height: 64px;
        display: block;
      }
      [data-composition-id="scene6-instagram"] .s6-ig-handle {
        font-size: 48px;
        font-weight: 400;
        color: #a0a0a0;
        line-height: 1.25;
      }
      [data-composition-id="scene6-instagram"] .s6-ig-followers {
        font-size: 44px;
        font-weight: 400;
        color: #737373;
        line-height: 1.25;
      }
      [data-composition-id="scene6-instagram"] .s6-follow-btn {
        position: relative;
        width: 420px;
        height: 140px;
        border-radius: 70px;
        background: #0095f6;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        box-shadow: 0 8px 24px rgba(0, 149, 246, 0.35);
      }
      [data-composition-id="scene6-instagram"] .s6-btn-text {
        position: absolute;
        font-family: "DM Sans", sans-serif;
        font-size: 54px;
        font-weight: 700;
        color: #ffffff;
        letter-spacing: 0.02em;
        white-space: nowrap;
      }
      [data-composition-id="scene6-instagram"] .s6-btn-text-follow {
        opacity: 1;
      }
      [data-composition-id="scene6-instagram"] .s6-btn-text-following {
        opacity: 0;
        display: flex;
        align-items: center;
        gap: 14px;
      }
      [data-composition-id="scene6-instagram"] .s6-chevron {
        display: inline-block;
        width: 32px;
        height: 32px;
      }
      [data-composition-id="scene6-instagram"] .s6-chevron svg {
        width: 32px;
        height: 32px;
        display: block;
      }

      /* Bottom subtitle */
      [data-composition-id="scene6-instagram"] .s6-sub {
        position: absolute;
        bottom: 110px;
        left: 50%;
        transform: translateX(-50%);
        font-family: "Roboto Mono", monospace;
        font-size: 22px;
        color: #96a2b6;
        letter-spacing: 0.05em;
        line-height: 1.5;
        text-align: center;
        white-space: nowrap;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true, defaults: { ease: "power3.out" } });
        const root = '[data-composition-id="scene6-instagram"]';
        const card = root + " #s6-ig-card";
        const btn = root + " #s6-follow-btn";

        // Baseline state for the hero card (set at t=0 via timeline so it resolves at playback)
        tl.set(card, { y: 200, autoAlpha: 0, scale: 0.94 }, 0);

        // Backdrop fade in
        tl.from(root + " .s6-backdrop", { autoAlpha: 0, duration: 0.4, ease: "power2.out" }, 0);

        // Headline words stagger in (chrome-gradient)
        tl.from(root + " .s6-word", {
          y: 30,
          autoAlpha: 0,
          duration: 0.5,
          ease: "back.out(1.4)",
          stagger: 0.08,
        }, 0.1);

        // Hero card slides up into center
        tl.to(card, {
          y: 0,
          autoAlpha: 1,
          scale: 1,
          duration: 0.65,
          ease: "back.out(1.2)",
        }, 0.25);

        // Handle slides in
        tl.from(root + " .s6-handle", {
          x: -20,
          autoAlpha: 0,
          duration: 0.4,
          ease: "expo.out",
        }, 0.7);

        // Accent line stroke reveal
        tl.to(root + " .s6-accent-line", {
          strokeDashoffset: 0,
          duration: 0.6,
          ease: "power2.inOut",
        }, 0.9);

        // Subtitle fade in
        tl.from(root + " .s6-sub", {
          y: 20,
          autoAlpha: 0,
          duration: 0.5,
          ease: "power3.out",
        }, 1.1);

        // Follow button press-in
        tl.to(btn, {
          scale: 0.93,
          duration: 0.15,
          ease: "power2.out",
        }, 1.4);

        // Release + elastic bounce
        tl.to(btn, {
          scale: 1,
          duration: 0.4,
          ease: "elastic.out(1, 0.4)",
        }, 1.55);

        // Button color: IG blue → dark gray
        tl.to(btn, {
          backgroundColor: "#2f2f2f",
          duration: 0.12,
          ease: "none",
        }, 1.55);

        // Fade "Follow" → "Following"
        tl.to(root + " #s6-btn-follow", {
          opacity: 0,
          duration: 0.08,
          ease: "none",
        }, 1.55);
        tl.to(root + " #s6-btn-following", {
          opacity: 1,
          duration: 0.08,
          ease: "none",
        }, 1.58);

        // Subtle card float (finite)
        tl.to(card, {
          y: -8,
          duration: 1.4,
          ease: "sine.inOut",
          repeat: 1,
          yoyo: true,
        }, 2.2);

        // Pad duration
        tl.to({}, { duration: 4 }, 0);

        window.__timelines["scene6-instagram"] = tl;
      })();
    </script>
  </div>
</template>
