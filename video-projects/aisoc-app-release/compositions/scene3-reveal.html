<template id="scene3-reveal-template">
  <div
    data-composition-id="scene3-reveal"
    data-start="0"
    data-duration="6"
    data-width="1920"
    data-height="1080"
  >
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;900&family=Roboto+Mono:wght@400;500;700&display=block"
    />

    <div class="s3-root">
      <!-- Headline on left -->
      <div class="s3-headline">
        <div class="s3-line s3-line-1">AIS.</div>
        <div class="s3-line s3-line-2">NOW MOBILE.</div>
        <div class="s3-tagbar">
          <span class="s3-tag">YOUR COMMUNITY</span>
          <span class="s3-tag-sep">·</span>
          <span class="s3-tag">YOUR POCKET</span>
        </div>
      </div>

      <!-- Chromatic split overlay (fires at slam) -->
      <div class="s3-chroma" aria-hidden="true">
        <div class="s3-chroma-r"></div>
        <div class="s3-chroma-g"></div>
        <div class="s3-chroma-b"></div>
      </div>

      <!-- Phone reveal (right side) -->
      <div class="s3-stage">
        <div class="s3-glow-bed"></div>

        <!-- Circuit traces SVG behind phone -->
        <svg class="s3-traces" viewBox="0 0 800 900" aria-hidden="true">
          <g fill="none" stroke="#37bdf8" stroke-width="1.5" opacity="0.55">
            <path d="M 80 200 L 220 200 L 260 160 L 360 160" class="s3-trace" />
            <path d="M 80 420 L 180 420 L 220 460 L 360 460" class="s3-trace" />
            <path d="M 80 640 L 240 640 L 280 680 L 360 680" class="s3-trace" />
            <path d="M 720 240 L 580 240 L 540 200 L 440 200" class="s3-trace" />
            <path d="M 720 480 L 620 480 L 580 520 L 440 520" class="s3-trace" />
            <path d="M 720 700 L 560 700 L 520 740 L 440 740" class="s3-trace" />
          </g>
          <g fill="#37bdf8">
            <circle cx="80" cy="200" r="4" class="s3-node" />
            <circle cx="80" cy="420" r="4" class="s3-node" />
            <circle cx="80" cy="640" r="4" class="s3-node" />
            <circle cx="720" cy="240" r="4" class="s3-node" />
            <circle cx="720" cy="480" r="4" class="s3-node" />
            <circle cx="720" cy="700" r="4" class="s3-node" />
          </g>
        </svg>

        <div class="s3-phone">
          <div class="s3-phone-bezel">
            <div class="s3-phone-notch"></div>
            <div class="s3-phone-screen">
              <!-- Status bar -->
              <div class="s3-statusbar">
                <span>9:41</span>
                <span class="s3-status-brand">AIS</span>
                <span class="s3-status-icons">● ▲ ▪</span>
              </div>

              <!-- Header -->
              <div class="s3-header">
                <div class="s3-header-title">
                  <span class="s3-logo-text">AIS</span>
                </div>
                <div class="s3-header-sub">MASTER AI AUTOMATION</div>
              </div>

              <!-- Tabs -->
              <div class="s3-tabs">
                <div class="s3-tab s3-tab-active">Calls</div>
                <div class="s3-tab">Wins</div>
                <div class="s3-tab">Courses</div>
                <div class="s3-tab">Rank</div>
              </div>

              <!-- Pinned card: Next Live Call -->
              <div class="s3-card">
                <div class="s3-card-label">
                  <span class="s3-card-dot"></span>NEXT LIVE CALL
                </div>
                <div class="s3-card-time">23:14</div>
                <div class="s3-card-title">Workflow Design Lab</div>
                <div class="s3-card-meta">Nate Herk · 5 days/wk</div>
              </div>

              <!-- Stats row -->
              <div class="s3-stats">
                <div class="s3-stat">
                  <div class="s3-stat-num">1,100</div>
                  <div class="s3-stat-lbl">DAILY ACTIVE</div>
                </div>
                <div class="s3-stat-div"></div>
                <div class="s3-stat">
                  <div class="s3-stat-num">300+</div>
                  <div class="s3-stat-lbl">SOLVED WINS</div>
                </div>
                <div class="s3-stat-div"></div>
                <div class="s3-stat">
                  <div class="s3-stat-num">5</div>
                  <div class="s3-stat-lbl">CALLS/WEEK</div>
                </div>
              </div>

              <!-- Bottom nav -->
              <div class="s3-nav">
                <div class="s3-nav-item s3-nav-active">Calls</div>
                <div class="s3-nav-item">Wins</div>
                <div class="s3-nav-item">Courses</div>
                <div class="s3-nav-item">Rank</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <style>
      [data-composition-id="scene3-reveal"] {
        position: absolute;
        inset: 0;
        background: transparent;
        overflow: hidden;
        font-family: "Montserrat", sans-serif;
        perspective: 1600px;
      }
      [data-composition-id="scene3-reveal"] .s3-root {
        position: absolute;
        inset: 0;
      }
      /* Headline (left) */
      [data-composition-id="scene3-reveal"] .s3-headline {
        position: absolute;
        left: 120px;
        top: 50%;
        transform: translateY(-50%);
        width: 760px;
      }
      [data-composition-id="scene3-reveal"] .s3-line {
        font-weight: 900;
        letter-spacing: -0.03em;
        line-height: 0.95;
      }
      [data-composition-id="scene3-reveal"] .s3-line-1 {
        font-size: 220px;
        color: #ffffff;
        text-shadow: 0 0 40px rgba(7, 18, 28, 0.7);
      }
      [data-composition-id="scene3-reveal"] .s3-line-2 {
        font-size: 140px;
        color: #37bdf8;
        margin-top: -18px;
        text-shadow: 0 0 40px rgba(55, 189, 248, 0.4);
      }
      [data-composition-id="scene3-reveal"] .s3-tagbar {
        font-family: "Roboto Mono", monospace;
        font-weight: 500;
        font-size: 22px;
        color: #96a2b6;
        letter-spacing: 0.22em;
        margin-top: 24px;
        display: flex;
        gap: 14px;
      }
      [data-composition-id="scene3-reveal"] .s3-tag-sep {
        color: #37bdf8;
      }

      /* Chromatic split overlay */
      [data-composition-id="scene3-reveal"] .s3-chroma {
        position: absolute;
        left: 120px;
        top: 50%;
        transform: translateY(-50%);
        width: 760px;
        height: 360px;
        pointer-events: none;
        mix-blend-mode: screen;
        opacity: 0;
      }
      [data-composition-id="scene3-reveal"] .s3-chroma-r,
      [data-composition-id="scene3-reveal"] .s3-chroma-g,
      [data-composition-id="scene3-reveal"] .s3-chroma-b {
        position: absolute;
        inset: 0;
        border-radius: 20px;
        filter: blur(40px);
      }
      [data-composition-id="scene3-reveal"] .s3-chroma-r {
        background: rgba(255, 60, 80, 0.6);
      }
      [data-composition-id="scene3-reveal"] .s3-chroma-g {
        background: rgba(60, 255, 180, 0.5);
      }
      [data-composition-id="scene3-reveal"] .s3-chroma-b {
        background: rgba(55, 189, 248, 0.7);
      }

      /* Phone stage (right) */
      [data-composition-id="scene3-reveal"] .s3-stage {
        position: absolute;
        right: 60px;
        top: 50%;
        transform: translateY(-50%);
        width: 820px;
        height: 920px;
        transform-style: preserve-3d;
      }
      [data-composition-id="scene3-reveal"] .s3-glow-bed {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 700px;
        height: 700px;
        background: radial-gradient(circle at center, rgba(55, 189, 248, 0.45) 0%, transparent 65%);
        filter: blur(30px);
      }
      [data-composition-id="scene3-reveal"] .s3-traces {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }
      [data-composition-id="scene3-reveal"] .s3-trace {
        stroke-dasharray: 400;
        stroke-dashoffset: 400;
      }
      [data-composition-id="scene3-reveal"] .s3-phone {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        width: 380px;
        height: 800px;
        transform-style: preserve-3d;
      }
      [data-composition-id="scene3-reveal"] .s3-phone-bezel {
        width: 380px;
        height: 800px;
        background: #0a1118;
        border: 8px solid #1a2432;
        border-radius: 58px;
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.7), 0 0 60px rgba(55, 189, 248, 0.35),
          inset 0 0 0 2px rgba(55, 189, 248, 0.15);
        padding: 14px;
        position: relative;
      }
      [data-composition-id="scene3-reveal"] .s3-phone-notch {
        position: absolute;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        width: 110px;
        height: 28px;
        background: #0a1118;
        border-radius: 14px;
        z-index: 3;
      }
      [data-composition-id="scene3-reveal"] .s3-phone-screen {
        width: 100%;
        height: 100%;
        background: linear-gradient(180deg, #07121c 0%, #0d2031 100%);
        border-radius: 44px;
        padding: 56px 22px 22px;
        color: #fff;
        font-family: "Montserrat", sans-serif;
        display: flex;
        flex-direction: column;
        gap: 14px;
        overflow: hidden;
      }

      /* Status bar */
      [data-composition-id="scene3-reveal"] .s3-statusbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-family: "Roboto Mono", monospace;
        font-size: 13px;
        color: #96a2b6;
        padding: 0 6px;
      }
      [data-composition-id="scene3-reveal"] .s3-status-brand {
        color: #37bdf8;
        font-weight: 700;
      }

      /* Header */
      [data-composition-id="scene3-reveal"] .s3-header {
        padding: 6px 4px 8px;
      }
      [data-composition-id="scene3-reveal"] .s3-logo-text {
        font-style: italic;
        font-weight: 900;
        font-size: 44px;
        color: #37bdf8;
        letter-spacing: -0.02em;
        text-shadow: 0 0 20px rgba(55, 189, 248, 0.6);
      }
      [data-composition-id="scene3-reveal"] .s3-header-sub {
        font-family: "Roboto Mono", monospace;
        font-size: 11px;
        color: #96a2b6;
        letter-spacing: 0.2em;
        margin-top: 4px;
      }

      /* Tabs */
      [data-composition-id="scene3-reveal"] .s3-tabs {
        display: flex;
        gap: 18px;
        border-bottom: 1px solid rgba(55, 189, 248, 0.12);
        padding-bottom: 10px;
      }
      [data-composition-id="scene3-reveal"] .s3-tab {
        font-family: "Roboto Mono", monospace;
        font-size: 13px;
        font-weight: 500;
        color: #96a2b6;
        letter-spacing: 0.08em;
        padding-bottom: 6px;
      }
      [data-composition-id="scene3-reveal"] .s3-tab-active {
        color: #37bdf8;
        border-bottom: 2px solid #37bdf8;
      }

      /* Pinned card */
      [data-composition-id="scene3-reveal"] .s3-card {
        background: linear-gradient(180deg, rgba(55, 189, 248, 0.08) 0%, rgba(13, 32, 49, 0.8) 100%);
        border: 1px solid rgba(55, 189, 248, 0.35);
        border-top: 4px solid #37bdf8;
        border-radius: 16px;
        padding: 16px 18px 18px;
        box-shadow: 0 0 0 rgba(55, 189, 248, 0);
      }
      [data-composition-id="scene3-reveal"] .s3-card-label {
        font-family: "Roboto Mono", monospace;
        font-size: 11px;
        color: #37bdf8;
        letter-spacing: 0.22em;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      [data-composition-id="scene3-reveal"] .s3-card-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: #37bdf8;
        box-shadow: 0 0 10px rgba(55, 189, 248, 0.9);
      }
      [data-composition-id="scene3-reveal"] .s3-card-time {
        font-family: "Montserrat", sans-serif;
        font-weight: 900;
        font-size: 58px;
        color: #ffffff;
        letter-spacing: -0.02em;
        line-height: 1;
        margin-top: 6px;
        font-variant-numeric: tabular-nums;
      }
      [data-composition-id="scene3-reveal"] .s3-card-title {
        font-weight: 700;
        font-size: 18px;
        color: #ffffff;
        margin-top: 6px;
      }
      [data-composition-id="scene3-reveal"] .s3-card-meta {
        font-family: "Roboto Mono", monospace;
        font-size: 12px;
        color: #96a2b6;
        letter-spacing: 0.05em;
        margin-top: 2px;
      }

      /* Stats */
      [data-composition-id="scene3-reveal"] .s3-stats {
        display: flex;
        align-items: stretch;
        background: rgba(13, 32, 49, 0.6);
        border: 1px solid rgba(55, 189, 248, 0.15);
        border-radius: 14px;
        padding: 14px 8px;
      }
      [data-composition-id="scene3-reveal"] .s3-stat {
        flex: 1;
        text-align: center;
      }
      [data-composition-id="scene3-reveal"] .s3-stat-num {
        font-family: "Montserrat", sans-serif;
        font-weight: 900;
        font-size: 22px;
        color: #ffffff;
      }
      [data-composition-id="scene3-reveal"] .s3-stat-lbl {
        font-family: "Roboto Mono", monospace;
        font-size: 9px;
        color: #96a2b6;
        letter-spacing: 0.15em;
        margin-top: 4px;
      }
      [data-composition-id="scene3-reveal"] .s3-stat-div {
        width: 1px;
        background: rgba(55, 189, 248, 0.2);
        margin: 2px 0;
      }

      /* Nav */
      [data-composition-id="scene3-reveal"] .s3-nav {
        display: flex;
        justify-content: space-around;
        padding-top: 12px;
        margin-top: auto;
        border-top: 1px solid rgba(55, 189, 248, 0.12);
      }
      [data-composition-id="scene3-reveal"] .s3-nav-item {
        font-family: "Roboto Mono", monospace;
        font-size: 11px;
        color: #96a2b6;
        letter-spacing: 0.1em;
      }
      [data-composition-id="scene3-reveal"] .s3-nav-active {
        color: #37bdf8;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true, defaults: { ease: "power3.out" } });
        const root = '[data-composition-id="scene3-reveal"]';

        // Initial states — headline hidden, chroma hidden
        tl.set(root + " .s3-headline", { autoAlpha: 0 }, 0);
        tl.set(root + " .s3-chroma", { autoAlpha: 0, scale: 0.9 }, 0);

        // Phone rotates in from 3D space
        tl.fromTo(root + " .s3-phone",
          { rotationY: 85, rotationX: 18, scale: 0.45, autoAlpha: 0, z: -400 },
          { rotationY: 0, rotationX: 0, scale: 1, autoAlpha: 1, z: 0, duration: 1.6, ease: "expo.out" },
          0.2
        );

        // Glow bed pulses up with phone
        tl.fromTo(root + " .s3-glow-bed",
          { scale: 0.3, autoAlpha: 0 },
          { scale: 1, autoAlpha: 1, duration: 1.6, ease: "expo.out" },
          0.2
        );

        // Circuit traces draw after phone settles
        tl.fromTo(root + " .s3-trace",
          { strokeDashoffset: 400 },
          { strokeDashoffset: 0, duration: 0.9, ease: "power2.out", stagger: 0.08 },
          1.6
        );

        // Circuit nodes pop in
        tl.from(root + " .s3-node", {
          scale: 0,
          autoAlpha: 0,
          duration: 0.4,
          ease: "back.out(1.8)",
          stagger: 0.07,
          transformOrigin: "center center",
        }, 1.9);

        // Pinned card glow pulse (3 cycles, finite)
        tl.to(root + " .s3-card",
          { boxShadow: "0 0 28px rgba(55, 189, 248, 0.55)", duration: 1.4, ease: "sine.inOut", repeat: 2, yoyo: true },
          2.0
        );

        // Card dot pulse (finite)
        tl.to(root + " .s3-card-dot",
          { scale: 1.25, duration: 0.8, ease: "sine.inOut", repeat: 3, yoyo: true },
          2.0
        );

        // HEADLINE SLAM at t=2.5s
        tl.to(root + " .s3-headline", { autoAlpha: 1, duration: 0.01 }, 2.5);
        tl.from(root + " .s3-line-1", {
          x: -80,
          autoAlpha: 0,
          scale: 0.92,
          duration: 0.55,
          ease: "expo.out",
        }, 2.5);
        tl.from(root + " .s3-line-2", {
          x: -80,
          autoAlpha: 0,
          scale: 0.92,
          duration: 0.55,
          ease: "expo.out",
        }, 2.9);
        tl.from(root + " .s3-tagbar", {
          y: 20,
          autoAlpha: 0,
          duration: 0.4,
          ease: "power3.out",
        }, 3.2);

        // Chromatic split burst on slam
        tl.to(root + " .s3-chroma", { autoAlpha: 0.8, scale: 1.2, duration: 0.15, ease: "power4.out" }, 2.9);
        tl.to(root + " .s3-chroma", { autoAlpha: 0, duration: 0.4, ease: "power2.in" }, 3.05);
        tl.fromTo(root + " .s3-chroma-r", { x: -14 }, { x: 14, duration: 0.15, ease: "power4.out" }, 2.9);
        tl.fromTo(root + " .s3-chroma-b", { x: 14 }, { x: -14, duration: 0.15, ease: "power4.out" }, 2.9);

        // Phone subtle floating idle (finite, 3 cycles over remaining ~3s)
        tl.to(root + " .s3-phone",
          { y: -10, duration: 1.5, ease: "sine.inOut", repeat: 1, yoyo: true },
          3.0
        );

        // Subtle scale on whole stage to hand into transition
        tl.to(root + " .s3-stage",
          { scale: 1.02, duration: 2.5, ease: "sine.inOut" },
          3.5
        );

        // Pad timeline
        tl.to({}, { duration: 6 }, 0);

        window.__timelines["scene3-reveal"] = tl;
      })();
    </script>
  </div>
</template>
