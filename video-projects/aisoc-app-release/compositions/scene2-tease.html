<template id="scene2-tease-template">
  <div
    data-composition-id="scene2-tease"
    data-start="0"
    data-duration="3.3"
    data-width="1920"
    data-height="1080"
  >
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Roboto+Mono:wght@500;700&display=block"
    />

    <div class="s2-root">
      <div class="s2-headline">
        <span class="s2-word">WE</span>
        <span class="s2-word">BUILT</span>
        <span class="s2-word">SOMETHING</span>
        <span class="s2-word s2-word-accent">BIG.</span>
      </div>

      <div class="s2-pills">
        <div class="s2-pill">BUILD</div>
        <div class="s2-sep">·</div>
        <div class="s2-pill">SHIP</div>
        <div class="s2-sep">·</div>
        <div class="s2-pill">GET PAID</div>
        <div class="s2-sep">·</div>
        <div class="s2-pill s2-pill-glow">NOW PORTABLE</div>
      </div>

      <!-- Phone silhouette SVG drifting in from right -->
      <svg class="s2-phone" viewBox="0 0 200 400" aria-hidden="true">
        <rect
          x="10"
          y="10"
          width="180"
          height="380"
          rx="36"
          ry="36"
          fill="none"
          stroke="#37bdf8"
          stroke-width="2.5"
          stroke-linejoin="round"
        />
        <rect x="75" y="25" width="50" height="8" rx="4" fill="#37bdf8" opacity="0.6" />
        <circle cx="100" cy="370" r="6" fill="none" stroke="#37bdf8" stroke-width="2" />
      </svg>
    </div>

    <style>
      [data-composition-id="scene2-tease"] {
        position: absolute;
        inset: 0;
        background: transparent;
        overflow: hidden;
        font-family: "Montserrat", sans-serif;
      }
      [data-composition-id="scene2-tease"] .s2-root {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 60px;
        padding: 0 200px;
      }
      [data-composition-id="scene2-tease"] .s2-headline {
        display: flex;
        gap: 34px;
        line-height: 0.95;
        justify-content: center;
      }
      [data-composition-id="scene2-tease"] .s2-word {
        font-weight: 900;
        font-size: 130px;
        color: #ffffff;
        letter-spacing: -0.02em;
        text-shadow: 0 0 30px rgba(7, 18, 28, 0.8);
      }
      [data-composition-id="scene2-tease"] .s2-word-accent {
        color: #37bdf8;
        text-shadow: 0 0 36px rgba(55, 189, 248, 0.55);
      }
      [data-composition-id="scene2-tease"] .s2-pills {
        display: flex;
        align-items: center;
        gap: 18px;
      }
      [data-composition-id="scene2-tease"] .s2-pill {
        font-family: "Roboto Mono", monospace;
        font-weight: 700;
        font-size: 26px;
        color: #ffffff;
        background: rgba(13, 32, 49, 0.85);
        border: 1px solid rgba(55, 189, 248, 0.55);
        padding: 14px 28px;
        border-radius: 999px;
        letter-spacing: 0.14em;
      }
      [data-composition-id="scene2-tease"] .s2-sep {
        font-family: "Roboto Mono", monospace;
        font-weight: 700;
        font-size: 28px;
        color: #37bdf8;
      }
      [data-composition-id="scene2-tease"] .s2-pill-glow {
        background: rgba(55, 189, 248, 0.15);
        border-color: #37bdf8;
        box-shadow: 0 0 24px rgba(55, 189, 248, 0.0);
      }
      [data-composition-id="scene2-tease"] .s2-phone {
        position: absolute;
        right: 120px;
        top: 50%;
        transform: translateY(-50%);
        width: 260px;
        height: 520px;
        opacity: 0;
        filter: blur(1px);
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true, defaults: { ease: "power3.out" } });
        const root = '[data-composition-id="scene2-tease"]';

        // Initial states
        tl.set(root + " .s2-pills", { autoAlpha: 0 }, 0);

        // Headline word stagger in
        tl.from(root + " .s2-word", {
          y: 60,
          autoAlpha: 0,
          duration: 0.5,
          ease: "back.out(1.5)",
          stagger: 0.07,
        }, 0.15);

        // Phone silhouette drift in from right
        tl.fromTo(root + " .s2-phone",
          { x: 180, opacity: 0 },
          { x: 0, opacity: 0.35, duration: 1.4, ease: "power1.out" },
          0.3
        );

        // Pills cascade in
        tl.to(root + " .s2-pills", { autoAlpha: 1, duration: 0.01 }, 0.9);
        tl.from(root + " .s2-pill, " + root + " .s2-sep", {
          y: 24,
          autoAlpha: 0,
          scale: 0.9,
          duration: 0.4,
          ease: "back.out(1.4)",
          stagger: 0.07,
        }, 0.95);

        // "NOW PORTABLE" glow up
        tl.to(root + " .s2-pill-glow", {
          boxShadow: "0 0 32px rgba(55, 189, 248, 0.85)",
          duration: 0.4,
          ease: "power2.out",
        }, 1.8);

        // Subtle accent on BIG pulse
        tl.to(root + " .s2-word-accent", {
          textShadow: "0 0 60px rgba(55, 189, 248, 0.9)",
          duration: 0.5,
          ease: "sine.inOut",
          repeat: 1,
          yoyo: true,
        }, 2.2);

        // Pad
        tl.to({}, { duration: 3.3 }, 0);

        window.__timelines["scene2-tease"] = tl;
      })();
    </script>
  </div>
</template>
