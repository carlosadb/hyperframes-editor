<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>AIS Mobile App Release — 30s</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;900&family=Roboto+Mono:wght@400;500;700&display=block"
    />
    <link rel="stylesheet" href="assets/brand-tokens.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #07121c;
        font-family: "Montserrat", sans-serif;
        color: #ffffff;
      }
      [data-composition-id="aisoc-app-release"] {
        position: relative;
        width: 1920px;
        height: 1080px;
        background: #07121c;
        overflow: hidden;
      }
      [data-composition-id="aisoc-app-release"] .bg {
        position: absolute;
        inset: 0;
        background: #07121c;
        z-index: 0;
      }
      [data-composition-id="aisoc-app-release"] .amb,
      [data-composition-id="aisoc-app-release"] .scene-wrap {
        position: absolute;
        inset: 0;
        will-change: opacity;
      }
      [data-composition-id="aisoc-app-release"] .amb {
        z-index: 1;
      }
      [data-composition-id="aisoc-app-release"] .scene-wrap {
        z-index: 10;
      }
      [data-composition-id="aisoc-app-release"] #grain-overlay {
        z-index: 100;
      }

      /* Flash-through-white transition layer */
      [data-composition-id="aisoc-app-release"] #flash-fx {
        position: absolute;
        inset: 0;
        background: #ffffff;
        z-index: 90;
        opacity: 0;
        pointer-events: none;
      }

      /* Whip-streak at scene 5→6 cut — cyan-tinted white bar, blurred, swept across */
      [data-composition-id="aisoc-app-release"] #whip-5to6 {
        position: absolute;
        top: 50%;
        left: 0;
        width: 55%;
        height: 14px;
        background: linear-gradient(
          90deg,
          transparent 0%,
          rgba(55, 189, 248, 0.3) 20%,
          #ffffff 50%,
          rgba(55, 189, 248, 0.3) 80%,
          transparent 100%
        );
        filter: blur(8px);
        transform: translate3d(-100%, -50%, 0);
        z-index: 95;
        opacity: 0;
        pointer-events: none;
      }

      /* ----- grain-overlay styles (inlined from component) ----- */
      /* v3: capped translate to ±4% (was ±15%), slowed to 2.4s, opacity 0.04→0.03.
         Large translates on a 200%-size noise texture read as pattern-swim / flicker on big screens. */
      @keyframes hf-grain-noise {
        0%,
        100% {
          transform: translate(0, 0);
        }
        10% {
          transform: translate(-2%, -2%);
        }
        20% {
          transform: translate(-3%, 2%);
        }
        30% {
          transform: translate(2%, -3%);
        }
        40% {
          transform: translate(-2%, 4%);
        }
        50% {
          transform: translate(-3%, 2%);
        }
        60% {
          transform: translate(4%, 0);
        }
        70% {
          transform: translate(0, 3%);
        }
        80% {
          transform: translate(-4%, 0);
        }
        90% {
          transform: translate(3%, 2%);
        }
      }
      [data-composition-id="aisoc-app-release"] #grain-overlay .grain-texture {
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        opacity: 0.03;
        animation: hf-grain-noise 2.4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
    </style>
  </head>
  <body>
    <div
      id="aisoc-app-release"
      data-composition-id="aisoc-app-release"
      data-start="0"
      data-duration="30"
      data-width="1920"
      data-height="1080"
    >
      <!-- Solid bg pedestal -->
      <div class="bg"></div>

      <!-- Ambient background layer (runs full 30s under everything) -->
      <div
        id="ambient"
        class="amb"
        data-composition-id="ambient-bg"
        data-composition-src="compositions/ambient-bg.html"
        data-start="0"
        data-duration="30"
        data-track-index="0"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Scene 1 — Hook (0.0–3.0) -->
      <div
        id="scene-1"
        class="scene-wrap"
        data-composition-id="scene1-hook"
        data-composition-src="compositions/scene1-hook.html"
        data-start="0"
        data-duration="3"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Scene 2 — Tease (2.7–6.0, overlaps s1 by 0.3s) -->
      <div
        id="scene-2"
        class="scene-wrap"
        data-composition-id="scene2-tease"
        data-composition-src="compositions/scene2-tease.html"
        data-start="2.7"
        data-duration="3.3"
        data-track-index="2"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Scene 3 — Reveal (5.7–12.0, overlaps s2 by 0.3s for flash transition) -->
      <div
        id="scene-3"
        class="scene-wrap"
        data-composition-id="scene3-reveal"
        data-composition-src="compositions/scene3-reveal.html"
        data-start="5.7"
        data-duration="6.3"
        data-track-index="3"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Scene 4 — Showcase (11.7–18.0, overlaps s3 by 0.3s) -->
      <div
        id="scene-4"
        class="scene-wrap"
        data-composition-id="scene4-showcase"
        data-composition-src="compositions/scene4-showcase.html"
        data-start="11.7"
        data-duration="6.3"
        data-track-index="4"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Scene 5 — X Post (17.7–22.5, overlaps s4 by 0.3s for whip-pan) -->
      <div
        id="scene-5"
        class="scene-wrap"
        data-composition-id="x-post"
        data-composition-src="compositions/x-post.html"
        data-start="17.7"
        data-duration="4.8"
        data-track-index="5"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Scene 6 — Instagram Follow (22.2–26.5, overlaps s5 by 0.3s) -->
      <div
        id="scene-6"
        class="scene-wrap"
        data-composition-id="scene6-instagram"
        data-composition-src="compositions/scene6-instagram.html"
        data-start="22.2"
        data-duration="4.3"
        data-track-index="6"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Scene 7 — Outro (26.2–30.0, overlaps s6 by 0.3s for blur crossfade) -->
      <div
        id="scene-7"
        class="scene-wrap"
        data-composition-id="scene7-outro"
        data-composition-src="compositions/scene7-outro.html"
        data-start="26.2"
        data-duration="3.8"
        data-track-index="7"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Flash-through-white transition overlay (fired at scene2→scene3 seam) -->
      <div id="flash-fx"></div>

      <!-- Whip-streak transition overlay (fires at scene5→scene6 seam, 22.15s) -->
      <div id="whip-5to6"></div>

      <!-- Grain overlay runs the whole composition -->
      <div
        id="grain-overlay"
        style="
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          pointer-events: none;
        "
      >
        <div class="grain-texture"></div>
      </div>

      <!-- Music bed (dedicated audio track) -->
      <audio
        id="music"
        data-start="0"
        data-duration="30"
        data-track-index="99"
        src="assets/music.mp3"
        data-volume="0.85"
      ></audio>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        (function () {
          window.__timelines = window.__timelines || {};
          const tl = gsap.timeline({ paused: true });

          // ---------- SCENE TRANSITIONS ----------
          // Rule: transitions handle scene exits (per /hyperframes skill).
          // Incoming scenes are placed with data-start overlapping the outgoing by the transition duration.

          // Scene 1 fully visible 0–2.7
          tl.set("#scene-1", { autoAlpha: 1 }, 0);

          // Transition 1 → 2: soft crossfade (0.3s) at 2.7
          tl.to("#scene-1", { autoAlpha: 0, duration: 0.3, ease: "power2.inOut" }, 2.7);
          tl.fromTo(
            "#scene-2",
            { autoAlpha: 0 },
            { autoAlpha: 1, duration: 0.3, ease: "power2.inOut" },
            2.7
          );

          // Transition 2 → 3: flash-through-white at 5.7 (0.6s total)
          // Fade scene2 to transparent while flash peaks, then scene3 comes in as flash fades
          tl.to(
            "#scene-2",
            { autoAlpha: 0, scale: 1.04, duration: 0.3, ease: "power3.inOut" },
            5.7
          );
          tl.to("#flash-fx", { opacity: 0.6, duration: 0.2, ease: "power3.in" }, 5.7);
          tl.fromTo(
            "#scene-3",
            { autoAlpha: 0, scale: 0.96 },
            { autoAlpha: 1, scale: 1, duration: 0.35, ease: "power3.out" },
            5.85
          );
          tl.to("#flash-fx", { opacity: 0, duration: 0.25, ease: "power2.out" }, 5.95);

          // Transition 3 → 4: push-slide left (0.3s) at 11.7
          tl.to(
            "#scene-3",
            { autoAlpha: 0, xPercent: -15, duration: 0.3, ease: "power3.inOut" },
            11.7
          );
          tl.fromTo(
            "#scene-4",
            { autoAlpha: 0, xPercent: 15 },
            { autoAlpha: 1, xPercent: 0, duration: 0.3, ease: "power3.inOut" },
            11.7
          );

          // Transition 4 → 5: whip-pan (0.3s) at 17.7 — opacity+translate only (no filter:blur, too expensive)
          tl.to(
            "#scene-4",
            {
              autoAlpha: 0,
              xPercent: -25,
              duration: 0.3,
              ease: "power3.in",
            },
            17.7
          );
          tl.fromTo(
            "#scene-5",
            { autoAlpha: 0, xPercent: 20 },
            {
              autoAlpha: 1,
              xPercent: 0,
              duration: 0.35,
              ease: "power3.out",
            },
            17.7
          );

          // Whip-streak at scene 5→6 seam (22.15s) — cyan-tinted white bar sweeps across, masking the cut
          tl.set("#whip-5to6", { opacity: 1 }, 22.15);
          tl.fromTo(
            "#whip-5to6",
            { xPercent: -100, scaleX: 0.6 },
            { xPercent: 220, scaleX: 1.6, duration: 0.35, ease: "power3.in" },
            22.15
          );
          tl.to(
            "#whip-5to6",
            { opacity: 0, duration: 0.12, ease: "power2.out" },
            22.42
          );

          // Transition 5 → 6: push-slide left (0.3s) at 22.2
          tl.to(
            "#scene-5",
            { autoAlpha: 0, xPercent: -15, duration: 0.3, ease: "power3.inOut" },
            22.2
          );
          tl.fromTo(
            "#scene-6",
            { autoAlpha: 0, xPercent: 15 },
            { autoAlpha: 1, xPercent: 0, duration: 0.3, ease: "power3.inOut" },
            22.2
          );

          // Transition 6 → 7: scale-crossfade (0.4s) at 26.2 — no filter:blur (too expensive on full-screen layers)
          tl.to(
            "#scene-6",
            {
              autoAlpha: 0,
              scale: 1.04,
              duration: 0.4,
              ease: "sine.inOut",
            },
            26.2
          );
          tl.fromTo(
            "#scene-7",
            { autoAlpha: 0, scale: 0.97 },
            {
              autoAlpha: 1,
              scale: 1,
              duration: 0.4,
              ease: "sine.inOut",
            },
            26.2
          );

          // Keep scene 7 fully visible at end
          tl.set("#scene-7", { autoAlpha: 1 }, 29.95);

          // Pad timeline to full 30s
          tl.to({}, { duration: 30 }, 0);

          window.__timelines["aisoc-app-release"] = tl;
        })();
      </script>
    </div>
  </body>
</html>
