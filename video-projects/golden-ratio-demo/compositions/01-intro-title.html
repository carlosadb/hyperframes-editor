<!--
  Section 01 — Cold open / "THE GOLDEN RATIO OF AI AUTOMATION"
  Local 0-8.20 · Master 0-8.20
  Anchors: 0.86 "Hey" · 2.16 "Nate" · 4.62 "golden" · 4.94 "ratio" · 6.06 "automation" · 7.80 exit
-->

<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>

<div
  id="s01-root"
  data-composition-id="s01-intro"
  data-start="0"
  data-duration="8.20"
  data-width="1920"
  data-height="1080"
  style="position: absolute; inset: 0;"
>
  <style>
    [data-composition-id="s01-intro"] .hero-block {
      position: absolute;
      left: 60px;
      top: 180px;
      width: 620px;
    }
    [data-composition-id="s01-intro"] .hero-eyebrow {
      font-family: "Roboto Mono", monospace;
      font-size: 22px;
      font-weight: 500;
      letter-spacing: 0.28em;
      color: #37bdf8;
      opacity: 0;
      margin-bottom: 14px;
      text-transform: uppercase;
    }
    [data-composition-id="s01-intro"] .hero-title {
      font-family: "Montserrat", sans-serif;
      font-weight: 900;
      font-size: 112px;
      line-height: 0.92;
      letter-spacing: -0.02em;
      color: #ffffff;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
    }
    [data-composition-id="s01-intro"] .hero-title .line {
      display: block;
      opacity: 0;
    }
    [data-composition-id="s01-intro"] .hero-sub {
      font-family: "Roboto Mono", monospace;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.18em;
      color: #37bdf8;
      margin-top: 30px;
      opacity: 0;
      text-transform: uppercase;
    }
    /* Nameplate lower-left */
    [data-composition-id="s01-intro"] .nameplate {
      position: absolute;
      left: 60px;
      bottom: 72px;
      padding: 18px 26px 20px;
      background: rgba(7, 18, 28, 0.78);
      border: 1px solid rgba(55, 189, 248, 0.38);
      border-left: 4px solid #37bdf8;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 8px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.55);
    }
    [data-composition-id="s01-intro"] .nameplate .np-name {
      font-family: "Montserrat", sans-serif;
      font-weight: 800;
      font-size: 30px;
      color: #ffffff;
      line-height: 1;
    }
    [data-composition-id="s01-intro"] .nameplate .np-role {
      font-family: "Roboto Mono", monospace;
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.22em;
      color: #37bdf8;
      margin-top: 8px;
      text-transform: uppercase;
    }
    /* Behind-title spiral — scoped to this section for extra emphasis on reveal */
    [data-composition-id="s01-intro"] .intro-spiral {
      position: absolute;
      left: -30px;
      top: 60px;
      width: 680px;
      height: 680px;
      pointer-events: none;
      opacity: 0;
    }
    [data-composition-id="s01-intro"] .intro-spiral svg {
      width: 100%;
      height: 100%;
      display: block;
      filter: drop-shadow(0 0 12px rgba(55, 189, 248, 0.3));
    }
    [data-composition-id="s01-intro"] .intro-spiral path {
      fill: none;
      stroke: rgba(55, 189, 248, 0.9);
      stroke-width: 2.2;
      stroke-linecap: round;
    }
    [data-composition-id="s01-intro"] .intro-spiral rect,
    [data-composition-id="s01-intro"] .intro-spiral line {
      fill: none;
      stroke: rgba(55, 189, 248, 0.4);
      stroke-width: 1.2;
    }
  </style>

  <!-- Nameplate (enters on "Hey", exits before title hero moment) -->
  <div class="nameplate">
    <div class="np-name">NATE HERK</div>
    <div class="np-role">AIS · AI Automation Society</div>
  </div>

  <!-- Hero title block -->
  <div class="hero-block">
    <div class="intro-spiral">
      <svg viewBox="0 0 680 680">
        <rect x="1" y="1" width="678" height="678"/>
        <line x1="420" y1="0" x2="420" y2="680"/>
        <line x1="420" y1="260" x2="680" y2="260"/>
        <line x1="580" y1="260" x2="580" y2="420"/>
        <line x1="420" y1="420" x2="580" y2="420"/>
        <path id="s01-arc1" d="M 0 0 A 420 420 0 0 1 420 420"/>
        <path id="s01-arc2" d="M 420 420 A 260 260 0 0 1 680 260"/>
        <path id="s01-arc3" d="M 680 260 A 160 160 0 0 1 580 420"/>
        <path id="s01-arc4" d="M 580 420 A 100 100 0 0 1 480 320"/>
      </svg>
    </div>

    <div class="hero-eyebrow">Lesson · 01</div>
    <div class="hero-title">
      <span class="line" id="t-the">THE</span>
      <span class="line" id="t-golden">GOLDEN</span>
      <span class="line" id="t-ratio">RATIO</span>
    </div>
    <div class="hero-sub">of AI automation</div>
  </div>

  <script>
    (function () {
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      // Nameplate enters on "Hey" (0.86), cushion 0.15s lead so the plate meets the word.
      tl.fromTo(".nameplate",
        { opacity: 0, x: -60 },
        { opacity: 1, x: 0, duration: 0.55, ease: "power3.out" },
        0.76
      );

      // Eyebrow "Lesson · 01" fades up with nameplate.
      tl.to(".hero-eyebrow", { opacity: 1, duration: 0.5, ease: "power2.out" }, 1.0);

      // Nameplate exits before the big hero moment.
      tl.to(".nameplate", {
        opacity: 0,
        x: -40,
        duration: 0.5,
        ease: "power2.in",
      }, 4.10);

      // Spiral draws in behind title at "golden" (4.62).
      tl.fromTo(".intro-spiral",
        { opacity: 0, scale: 0.92 },
        { opacity: 0.35, scale: 1, duration: 0.6, ease: "power3.out" },
        4.60
      );

      // Stroke-dashoffset reveal on each arc, staggered.
      const arcs = [
        { id: "#s01-arc1", len: 1320 },
        { id: "#s01-arc2", len: 410 },
        { id: "#s01-arc3", len: 252 },
        { id: "#s01-arc4", len: 158 },
      ];
      arcs.forEach((arc, i) => {
        const el = document.querySelector(arc.id);
        if (el) {
          el.style.strokeDasharray = arc.len;
          el.style.strokeDashoffset = arc.len;
        }
        tl.to(arc.id, {
          strokeDashoffset: 0,
          duration: 0.55,
          ease: "power2.out",
        }, 4.60 + i * 0.12);
      });

      // Title words cascade on "golden" (4.62) and "ratio" (4.94).
      tl.fromTo("#t-the",
        { opacity: 0, y: 40, scale: 0.92 },
        { opacity: 1, y: 0, scale: 1, duration: 0.42, ease: "expo.out" },
        4.40
      );
      tl.fromTo("#t-golden",
        { opacity: 0, y: 50, scale: 0.90 },
        { opacity: 1, y: 0, scale: 1, duration: 0.48, ease: "expo.out" },
        4.62
      );
      tl.fromTo("#t-ratio",
        { opacity: 0, y: 50, scale: 0.90 },
        { opacity: 1, y: 0, scale: 1, duration: 0.55, ease: "back.out(1.4)" },
        4.94
      );

      // Subtitle "of AI automation" drops in on "automation" (6.06).
      tl.fromTo(".hero-sub",
        { opacity: 0, y: 16 },
        { opacity: 1, y: 0, duration: 0.55, ease: "power3.out" },
        6.00
      );

      // Exit prep — everything fades just before whip-streak at 8.00.
      tl.to([".hero-eyebrow", ".hero-title", ".hero-sub", ".intro-spiral"], {
        opacity: 0,
        duration: 0.35,
        ease: "power2.in",
      }, 7.70);

      // Anchor — Law 11
      tl.to({}, { duration: 8.20 }, 0);
      window.__timelines["s01-intro"] = tl;
    })();
  </script>
</div>
