<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Golden Ratio of AI Automation — AIS Lesson</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800;900&family=Roboto+Mono:wght@400;500;700&display=block"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/brand-tokens.css" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1920px; height: 1080px; overflow: hidden;
        background: #000;
        font-family: "Montserrat", sans-serif;
        color: #fff;
      }
      [data-composition-id="golden-ratio-demo"] {
        position: relative;
        width: 1920px; height: 1080px;
        overflow: hidden;
        background: #000;
      }
      /* Face-cam fills the frame */
      [data-composition-id="golden-ratio-demo"] #face-video {
        position: absolute; inset: 0;
        width: 1920px; height: 1080px;
        object-fit: cover;
        z-index: 0;
      }
      /* Subtle blue-tint wash on top of footage so cyan MG reads clean */
      [data-composition-id="golden-ratio-demo"] .face-wash {
        position: absolute; inset: 0;
        background: linear-gradient(180deg, rgba(7,18,28,0.10) 0%, rgba(7,18,28,0.30) 100%);
        pointer-events: none;
        z-index: 1;
        mix-blend-mode: multiply;
      }
      /* Left-zone dark mask — turns x 0..760 into a clean dark canvas for MG.
         Nate's torso starts around x=600 and his face centers near x=950, so this
         only covers his left shoulder edge softly. Fixes chrome-gradient text
         being invisible against the grey wall. Sits ABOVE face-wash/video, BELOW scene-layers. */
      [data-composition-id="golden-ratio-demo"] .left-mask {
        position: absolute;
        top: 0; left: 0;
        width: 760px;
        height: 1080px;
        background: linear-gradient(90deg,
          rgba(7, 18, 28, 0.92) 0%,
          rgba(7, 18, 28, 0.88) 40%,
          rgba(7, 18, 28, 0.62) 75%,
          rgba(7, 18, 28, 0.0) 100%);
        pointer-events: none;
        z-index: 3;
      }
      /* Vignette — MOTION_PHILOSOPHY Law 10 */
      [data-composition-id="golden-ratio-demo"] .vignette {
        position: absolute; inset: 0;
        background: radial-gradient(ellipse 70% 60% at center, transparent 40%, rgba(0,0,0,0.55) 100%);
        pointer-events: none;
        z-index: 4;
      }
      /* Scene layers — sit ABOVE the dark mask so MG reads clean */
      [data-composition-id="golden-ratio-demo"] .scene-layer {
        position: absolute; inset: 0;
        width: 1920px; height: 1080px;
        z-index: 5;
      }
      /* Whip-streak global layer (track 7) */
      [data-composition-id="golden-ratio-demo"] .whip {
        position: absolute; top: 50%; left: 0;
        width: 55%; height: 14px;
        background: linear-gradient(90deg, transparent 0%, rgba(55,189,248,0.0) 20%, rgba(55,189,248,0.9) 50%, rgba(55,189,248,0.0) 80%, transparent 100%);
        filter: blur(14px);
        transform: translate(-100%, -50%);
        z-index: 50;
        opacity: 0;
        pointer-events: none;
      }
      [data-composition-id="golden-ratio-demo"] .whip::after {
        content: "";
        position: absolute; inset: 0;
        background: linear-gradient(90deg, transparent 40%, rgba(255,255,255,0.85) 50%, transparent 60%);
        filter: blur(4px);
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="golden-ratio-demo"
      data-duration="37.67"
      data-width="1920"
      data-height="1080"
    >
      <!-- Layer 0: face-cam (muted; audio is sibling) -->
      <video
        id="face-video"
        data-start="0"
        data-duration="37.67"
        data-track-index="0"
        src="assets/golden-ratio-demo.mp4"
        muted
        playsinline
      ></video>

      <!-- Audio sibling -->
      <audio
        id="face-audio"
        data-start="0"
        data-duration="37.67"
        data-track-index="4"
        data-volume="1"
        src="assets/golden-ratio-demo.mp4"
      ></audio>

      <!-- Layer 1: face wash (pins cyan-blue tint so MG pops) -->
      <div class="face-wash clip" data-start="0" data-duration="37.67" data-track-index="5"></div>

      <!-- Layer 1b: left-zone dark mask — creates a clean dark canvas for MG text -->
      <div class="left-mask clip" data-start="0" data-duration="37.67" data-track-index="13"></div>

      <!-- Layer 2: vignette -->
      <div class="vignette clip" data-start="0" data-duration="37.67" data-track-index="6"></div>

      <!-- Ambient golden-spiral through-line (always on) -->
      <div
        id="ambient"
        class="scene-layer"
        data-composition-id="ambient-spiral"
        data-composition-src="compositions/ambient-spiral.html"
        data-start="0"
        data-duration="37.67"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Section 01: Cold open / Golden Ratio title (0 - 8.20) -->
      <div
        id="sec-01"
        class="scene-layer"
        data-composition-id="s01-intro"
        data-composition-src="compositions/01-intro-title.html"
        data-start="0"
        data-duration="8.20"
        data-track-index="2"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Section 02: 60% deterministic (8.20 - 15.26) -->
      <div
        id="sec-02"
        class="scene-layer"
        data-composition-id="s02-sixty"
        data-composition-src="compositions/02-sixty-deterministic.html"
        data-start="sec-01"
        data-duration="7.06"
        data-track-index="2"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Section 03: 30% AI-assisted (15.26 - 18.78) -->
      <div
        id="sec-03"
        class="scene-layer"
        data-composition-id="s03-thirty"
        data-composition-src="compositions/03-thirty-ai-assisted.html"
        data-start="sec-02"
        data-duration="3.52"
        data-track-index="2"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Section 04: 10% human-in-loop (18.78 - 23.34) -->
      <div
        id="sec-04"
        class="scene-layer"
        data-composition-id="s04-ten"
        data-composition-src="compositions/04-ten-human.html"
        data-start="sec-03"
        data-duration="4.56"
        data-track-index="2"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Section 05: Magic/Trash/Middle (23.34 - 34.94) -->
      <div
        id="sec-05"
        class="scene-layer"
        data-composition-id="s05-magic-trash-middle"
        data-composition-src="compositions/05-magic-trash-middle.html"
        data-start="sec-04"
        data-duration="11.60"
        data-track-index="2"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Section 06: Outro recap (34.94 - 37.67) -->
      <div
        id="sec-06"
        class="scene-layer"
        data-composition-id="s06-outro"
        data-composition-src="compositions/06-outro-recap.html"
        data-start="sec-05"
        data-duration="2.73"
        data-track-index="2"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Whip-streak transitions (root-level, fired at section boundaries) -->
      <div class="whip clip" id="whip1" data-start="8.00" data-duration="0.5" data-track-index="7"></div>
      <div class="whip clip" id="whip2" data-start="15.06" data-duration="0.5" data-track-index="8"></div>
      <div class="whip clip" id="whip3" data-start="18.58" data-duration="0.5" data-track-index="9"></div>
      <div class="whip clip" id="whip4" data-start="23.14" data-duration="0.5" data-track-index="10"></div>
      <div class="whip clip" id="whip5" data-start="34.74" data-duration="0.5" data-track-index="11"></div>

      <!-- Grain overlay (installed component) -->
      <div
        id="grain-overlay"
        class="clip"
        data-start="0"
        data-duration="37.67"
        data-track-index="12"
        style="
          position: absolute;
          top: 0; left: 0;
          width: 100%; height: 100%;
          pointer-events: none;
          z-index: 100;
        "
      >
        <div class="grain-texture"></div>
      </div>
    </div>

    <style>
      @keyframes hf-grain-noise {
        0%, 100% { transform: translate(0, 0); }
        10% { transform: translate(-5%, -5%); }
        20% { transform: translate(-10%, 5%); }
        30% { transform: translate(5%, -10%); }
        40% { transform: translate(-5%, 15%); }
        50% { transform: translate(-10%, 5%); }
        60% { transform: translate(15%, 0); }
        70% { transform: translate(0, 10%); }
        80% { transform: translate(-15%, 0); }
        90% { transform: translate(10%, 5%); }
      }
      #grain-overlay .grain-texture {
        position: absolute;
        top: -50%; left: -50%;
        width: 200%; height: 200%;
        background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        opacity: 0.08;
        animation: hf-grain-noise 0.5s steps(1) infinite;
        mix-blend-mode: overlay;
      }
    </style>

    <script>
      window.__timelines = window.__timelines || {};
      const mainTl = gsap.timeline({ paused: true });

      // Whip-streak tweens. Each streak rips across the frame at its section boundary.
      const whips = [
        { id: "#whip1", t: 8.00 },
        { id: "#whip2", t: 15.06 },
        { id: "#whip3", t: 18.58 },
        { id: "#whip4", t: 23.14 },
        { id: "#whip5", t: 34.74 },
      ];
      whips.forEach(({ id, t }) => {
        mainTl.fromTo(
          id,
          { x: -1100, opacity: 0, scaleX: 0.8 },
          { x: 2100, opacity: 1, scaleX: 1.4, duration: 0.45, ease: "power3.in" },
          t
        );
        mainTl.to(id, { opacity: 0, duration: 0.1 }, t + 0.45);
      });

      // Anchor — Law 11 — ensure mainTl.duration() >= data-duration
      mainTl.set({}, {}, 37.67);

      window.__timelines["golden-ratio-demo"] = mainTl;
    </script>
  </body>
</html>
