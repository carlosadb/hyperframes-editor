:root {
  /* ─────────────── BRAND PALETTE ─────────────── */
  --ais-blue:         #2CA9E1;   /* Primary. Logo glow, CTAs, gradients, icons */
  --ais-dark-blue:    #143C5A;   /* Deep navy accent / scrollbar */
  --ais-medium-blue:  #4A90C0;
  --ais-teal:         #2D9BA8;   /* Gradient partner to blue */
  --ais-orange:       #F39237;   /* Accent for awards, Plus tier, warm callouts */
  --ais-white:        #F0F2F5;   /* Body text */
  --ais-white-pure:   #FFFFFF;   /* Logo, strong emphasis */
  --ais-grey-light:   #C5C8CC;   /* Secondary text */
  --ais-grey:         #8A8F98;   /* Tertiary text, labels */
  --ais-dark-grey:    #2A2D33;
  --ais-dark:         #0A0C10;   /* Base surface */
  --ais-darker:       #060810;   /* Page background */

  /* With-alpha variants for layering */
  --ais-blue-dim:     rgba(44, 169, 225, 0.6);
  --ais-orange-dim:   rgba(243, 146, 55, 0.6);

  /* ─────────────── SEMANTIC COLORS ─────────────── */
  /* Background layers */
  --bg-page:          var(--ais-darker);
  --bg-base:          var(--ais-dark);
  --bg-surface:       rgba(12, 15, 24, 0.95);
  --bg-card:          rgba(16, 20, 32, 0.65);
  --bg-glass:         rgba(44, 169, 225, 0.04);
  --bg-elevated:      rgba(22, 27, 44, 0.8);

  /* Foreground */
  --fg-strong:        var(--ais-white-pure); /* H1, logo, emphasis */
  --fg:               var(--ais-white);      /* Default body */
  --fg-muted:         var(--ais-grey-light); /* Secondary paragraphs */
  --fg-subtle:        var(--ais-grey);       /* Labels, metadata */
  --fg-accent:        var(--ais-blue);       /* Interactive accent */
  --fg-warm:          var(--ais-orange);     /* Warm accent (Plus / awards) */

  /* Borders */
  --border:           rgba(44, 169, 225, 0.1);
  --border-hover:     rgba(44, 169, 225, 0.3);
  --border-strong:    rgba(44, 169, 225, 0.45);
  --border-strongest: rgba(44, 169, 225, 0.7);
  --border-orange:    rgba(243, 146, 55, 0.25);
  --border-orange-strong: rgba(243, 146, 55, 0.45);

  /* Gradients */
  --grad-cool:        linear-gradient(135deg, var(--ais-blue) 0%, var(--ais-teal) 100%);
  --grad-warm:        linear-gradient(135deg, var(--ais-orange) 0%, #F9C74F 100%);
  --grad-hairline:    linear-gradient(90deg, transparent 0%, var(--border) 20%, var(--border-hover) 50%, var(--border) 80%, transparent 100%);

  /* Glows / shadows */
  --glow-blue:        0 0 80px rgba(44, 169, 225, 0.15), 0 0 160px rgba(44, 169, 225, 0.05);
  --glow-blue-intense:0 0 40px rgba(44, 169, 225, 0.30), 0 0 120px rgba(44, 169, 225, 0.10);
  --glow-orange:      0 0 60px rgba(243, 146, 55, 0.20), 0 0 120px rgba(243, 146, 55, 0.05);
  --glow-logo:        0 0 50px rgba(44, 169, 225, 0.75); /* AIS outer glow #54679F @ 75% */
  --shadow-sm:        0 2px 8px rgba(0, 0, 0, 0.25);
  --shadow-md:        0 4px 24px rgba(0, 0, 0, 0.35);
  --shadow-lg:        0 12px 48px rgba(0, 0, 0, 0.45);

  /* ─────────────── TYPOGRAPHY ─────────────── */
  --font-mono:        'Roboto Mono', ui-monospace, monospace;     /* Headings, UI labels, buttons, stats */
  --font-sans:        'Montserrat', system-ui, sans-serif;        /* Body copy */

  /* Type scale */
  --text-xs:    0.75rem;   /* 12 */
  --text-sm:    0.875rem;  /* 14 */
  --text-base:  1rem;      /* 16 */
  --text-lg:    1.125rem;  /* 18 */
  --text-xl:    1.25rem;   /* 20 */
  --text-2xl:   1.5rem;    /* 24 */
  --text-3xl:   2rem;      /* 32 */
  --text-4xl:   2.5rem;    /* 40 */
  --text-5xl:   3.5rem;    /* 56 */
  --text-6xl:   5rem;      /* 80 */
  --text-7xl:   7rem;      /* 112 */
  --text-hero:  clamp(2.75rem, 10vw, 9rem);

  /* ─────────────── SPACING ─────────────── */
  --sp-1:  0.25rem;  /*  4 */
  --sp-2:  0.5rem;   /*  8 */
  --sp-3:  0.75rem;  /* 12 */
  --sp-4:  1rem;     /* 16 */
  --sp-6:  1.5rem;   /* 24 */
  --sp-8:  2rem;     /* 32 */
  --sp-10: 2.5rem;   /* 40 */
  --sp-12: 3rem;     /* 48 */
  --sp-16: 4rem;     /* 64 */
  --sp-20: 5rem;     /* 80 */
  --sp-24: 6rem;     /* 96 */
  --sp-32: 8rem;     /* 128 */

  /* ─────────────── RADII ─────────────── */
  --radius-sm:   6px;
  --radius-md:   10px;
  --radius-lg:   16px;
  --radius-xl:   24px;
  --radius-full: 9999px;

  /* ─────────────── EASING / MOTION ─────────────── */
  --ease-out:    cubic-bezier(0.16, 1, 0.3, 1);
  --ease-in-out: cubic-bezier(0.65, 0, 0.35, 1);
  --t-fast:    0.25s;
  --t-base:    0.35s;
  --t-slow:    0.9s;

  /* ─────────────── LAYOUT ─────────────── */
  --container:         1240px;
  --container-padding: var(--sp-6);
}

@media (min-width: 768px) { :root { --container-padding: var(--sp-8); } }
@media (min-width: 1024px){ :root { --container-padding: var(--sp-12); } }
