<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Your First AI Agent — Launch Promo</title>
<link rel="stylesheet" href="colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; background: #000; color: #fff; font-family: 'Montserrat', system-ui, sans-serif; overflow: hidden; height: 100%; }
  #root { width: 100vw; height: 100vh; }
</style>
</head>
<body>
  <div id="root" data-screen-label="00:00"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="animations.jsx"></script>
  <script type="text/babel" src="scenes.jsx"></script>
  <script type="text/babel">
    const { useState, useEffect } = React;

    // Updates the data-screen-label every second so commenters get exact timestamps.
    function TimecodeLabel() {
      const t = useTime();
      useEffect(() => {
        const root = document.getElementById('root');
        if (!root) return;
        const sec = Math.floor(t);
        const m = String(Math.floor(sec / 60)).padStart(2, '0');
        const s = String(sec % 60).padStart(2, '0');
        const label = `${m}:${s}`;
        if (root.dataset.screenLabel !== label) root.dataset.screenLabel = label;
      }, [Math.floor(t)]);
      return null;
    }

    function Video() {
      return (
        <Stage width={1920} height={1080} duration={32} background="#060810" persistKey="first-agent-promo">
          <TimecodeLabel/>
          <Atmosphere warm={false}/>
          {/* Scene-specific atmospheric variations */}
          <Sprite start={23.5} end={32}><Atmosphere warm={true}/></Sprite>

          <Scene1Logo start={0} end={2.4}/>
          <Scene2Question start={2.4} end={5.4}/>
          <Scene3Title start={5.4} end={9.0}/>
          <Scene4Agenda start={9.0} end={14.0}/>
          <Scene5Terminal start={14.0} end={19.0}/>
          <Scene6Stats start={19.0} end={23.5}/>
          <Scene7DatePrice start={23.5} end={27.0}/>
          <Scene8CTA start={27.0} end={32.0}/>

          {/* Persistent overlay UI starts after the title slam */}
          <TickerOverlay start={5.4} end={27.0}/>
        </Stage>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Video/>);
  </script>
</body>
</html>
