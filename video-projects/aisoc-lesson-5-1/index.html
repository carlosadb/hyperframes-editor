<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>Lesson 5.1 Demo — AIS Educational Lecture</title>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;900&family=Roboto+Mono:wght@400;500;700&display=block"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/brand-tokens.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #07121c;
        font-family: "Montserrat", sans-serif;
        color: #ffffff;
      }
      [data-composition-id="lesson-5-1"] {
        position: relative;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #07121c;
      }
      /* Static AIS particle-wave backdrop. Pinned under everything. */
      [data-composition-id="lesson-5-1"] .bg-image {
        position: absolute;
        inset: 0;
        width: 1920px;
        height: 1080px;
        object-fit: cover;
        z-index: 0;
      }
      /* Outer clip — drives corner PiP geometry, rounded mask, drop shadow.
         GSAP animates width/height/right/bottom/border-radius/box-shadow on this. */
      [data-composition-id="lesson-5-1"] #face-clip {
        position: absolute;
        right: 48px;
        bottom: 48px;
        width: 360px;
        height: 540px;
        border-radius: 32px;
        overflow: hidden;
        z-index: 2;
        box-shadow:
          0 20px 80px rgba(0, 0, 0, 0.55),
          0 0 0 1px rgba(55, 189, 248, 0.25);
        will-change: width, height, right, bottom, border-radius;
      }
      /* Inner wrapper at source-native dimensions. GSAP scales + translates this
         to show the center vertical slice (x=600..1320 of 1920) at the clip size.
         Never animates the <video> itself — it just sits inside at native size. */
      [data-composition-id="lesson-5-1"] #face-wrapper {
        position: absolute;
        top: 0;
        left: 0;
        width: 1920px;
        height: 1080px;
        transform-origin: 0 0;
        /* Initial CORNER mode: show x=600..1320 (720 wide) scaled to 360 wide.
           scale 0.5; then shift so x=600 lands at clip x=0. */
        transform: translate(-300px, 0) scale(0.5);
      }
      [data-composition-id="lesson-5-1"] #face-video {
        display: block;
        width: 1920px;
        height: 1080px;
        object-fit: cover;
      }
      /* Section overlay layer — sub-compositions stack here. */
      [data-composition-id="lesson-5-1"] .scene-layer {
        position: absolute;
        inset: 0;
        width: 1920px;
        height: 1080px;
        z-index: 1;
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="lesson-5-1"
      data-duration="112.789"
      data-width="1920"
      data-height="1080"
    >
      <!-- Layer 0: static AIS backdrop (1920x1080 PNG, particle wave + AIS logo) -->
      <img class="bg-image" src="assets/ais-background.png" alt="" />

      <!-- Layer 2: face-cam PiP. Outer clip + inner wrapper + video. -->
      <div id="face-clip">
        <div id="face-wrapper">
          <video
            id="face-video"
            data-start="0"
            data-duration="112.789"
            data-track-index="0"
            src="assets/lesson-5.1-stitched.mp4"
            muted
            playsinline
          ></video>
        </div>
      </div>

      <!-- Audio track — mixer-owned, separate from the muted video. -->
      <audio
        id="face-audio"
        data-start="0"
        data-duration="112.789"
        data-track-index="4"
        data-volume="1"
        src="assets/lesson-5.1-stitched.mp4"
      ></audio>

      <!-- Section 01: The Moment You Know (0 - 19s) -->
      <div
        id="sec-01"
        class="scene-layer"
        data-composition-id="01-hook"
        data-composition-src="compositions/sections/01-hook.html"
        data-start="0"
        data-duration="19"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Section 02: Cost of Hesitation (19 - 30.82s) -->
      <div
        id="sec-02"
        class="scene-layer"
        data-composition-id="02-cost-of-hesitation"
        data-composition-src="compositions/sections/02-cost-of-hesitation.html"
        data-start="sec-01"
        data-duration="11.82"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Section 03: Missing Pieces (30.82 - 38.34s) -->
      <div
        id="sec-03"
        class="scene-layer"
        data-composition-id="03-missing-pieces"
        data-composition-src="compositions/sections/03-missing-pieces.html"
        data-start="sec-02"
        data-duration="7.52"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Section 04: The Promise (38.34 - 48.96s) -->
      <div
        id="sec-04"
        class="scene-layer"
        data-composition-id="04-promise"
        data-composition-src="compositions/sections/04-promise.html"
        data-start="sec-03"
        data-duration="10.62"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Section 05: Relationship Expansion Tool (48.96 - 69.64s) -->
      <div
        id="sec-05"
        class="scene-layer"
        data-composition-id="05-relationship-tool"
        data-composition-src="compositions/sections/05-relationship-tool.html"
        data-start="sec-04"
        data-duration="20.68"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Section 06: Cold Prospect (69.64 - 83.74s) -->
      <div
        id="sec-06"
        class="scene-layer"
        data-composition-id="06-cold-prospect"
        data-composition-src="compositions/sections/06-cold-prospect.html"
        data-start="sec-05"
        data-duration="14.10"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Section 07: Two Paths Framework (83.74 - 94.88s) -->
      <div
        id="sec-07"
        class="scene-layer"
        data-composition-id="07-two-paths"
        data-composition-src="compositions/sections/07-two-paths.html"
        data-start="sec-06"
        data-duration="11.14"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Section 08: WHEN not WHETHER (94.88 - 101.78s) -->
      <div
        id="sec-08"
        class="scene-layer"
        data-composition-id="08-when-not-whether"
        data-composition-src="compositions/sections/08-when-not-whether.html"
        data-start="sec-07"
        data-duration="6.90"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Section 09: Three Signals (101.78 - 112.789s) -->
      <div
        id="sec-09"
        class="scene-layer"
        data-composition-id="09-three-signals"
        data-composition-src="compositions/sections/09-three-signals.html"
        data-start="sec-08"
        data-duration="11.009"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      const mainTl = gsap.timeline({ paused: true });

      // Face-cam mode presets.
      // CORNER_BR: PiP at bottom-right, vertical 2:3 crop of source center.
      // FULLSCREEN: cover 1920x1080, source filmed natively.
      const CORNER_BR = {
        clip: {
          right: 48,
          bottom: 48,
          width: 360,
          height: 540,
          borderRadius: 32,
          boxShadow:
            "0 20px 80px rgba(0,0,0,0.55), 0 0 0 1px rgba(55,189,248,0.25)",
        },
        wrap: { x: -300, y: 0, scale: 0.5 },
      };
      const FULLSCREEN = {
        clip: {
          right: 0,
          bottom: 0,
          width: 1920,
          height: 1080,
          borderRadius: 0,
          boxShadow: "0 0 0 0 rgba(0,0,0,0)",
        },
        wrap: { x: 0, y: 0, scale: 1 },
      };

      function setFaceMode(t, mode) {
        mainTl.set("#face-clip", mode.clip, t);
        mainTl.set("#face-wrapper", mode.wrap, t);
      }

      // Face-cam starts in corner. Section boundaries will re-register
      // mode switches as sections are added.
      setFaceMode(0, CORNER_BR);

      // Pad to measured duration so the composition length matches media.
      mainTl.set({}, {}, 112.789);
      window.__timelines["lesson-5-1"] = mainTl;
    </script>
  </body>
</html>
