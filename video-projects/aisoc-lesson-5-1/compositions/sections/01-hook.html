<template id="01-hook-template">
  <div
    data-composition-id="01-hook"
    data-start="0"
    data-width="1920"
    data-height="1080"
    data-duration="19"
  >
    <!-- Title beat -->
    <div class="s1-title-zone">
      <div class="s1-pill">LESSON · 5.1</div>
      <h1 class="s1-headline">
        <span class="w">When</span>
        <span class="w">and</span>
        <span class="w">how</span>
        <span class="w">to</span>
        <span class="w accent">pitch</span>
        <span class="w">an</span>
        <span class="w accent">audit.</span>
      </h1>
      <div class="s1-rule"></div>
    </div>

    <!-- Diagram beat: project box + dashed REAL SCOPE halo + 4 problem bubbles -->
    <div class="s1-diagram">
      <div class="s1-halo"></div>
      <div class="s1-halo-label">THE REAL SCOPE</div>

      <div class="s1-project">
        <div class="s1-project-label">THE PROJECT</div>
        <div class="s1-project-sub">What you were hired to fix</div>
      </div>

      <div class="s1-problem s1-p1">
        <span class="s1-problem-dot"></span>INEFFICIENCIES
      </div>
      <div class="s1-problem s1-p2">
        <span class="s1-problem-dot"></span>BROKEN WORKFLOWS
      </div>
      <div class="s1-problem s1-p3">
        <span class="s1-problem-dot"></span>MORE AUTOMATIONS
      </div>
      <div class="s1-problem s1-p4">
        <span class="s1-problem-dot"></span>UNASKED NEEDS
      </div>

      <!-- Hesitation payoff -->
      <div class="s1-question">???</div>
    </div>

    <style>
      [data-composition-id="01-hook"] {
        position: absolute;
        inset: 0;
        font-family: "Montserrat", sans-serif;
      }

      /* ---------- Title beat ---------- */
      [data-composition-id="01-hook"] .s1-title-zone {
        position: absolute;
        top: 100px;
        left: 120px;
        width: 1300px;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 18px;
      }
      [data-composition-id="01-hook"] .s1-pill {
        font-family: "Roboto Mono", monospace;
        font-weight: 500;
        font-size: 22px;
        letter-spacing: 0.32em;
        color: #37bdf8;
        padding: 10px 22px;
        border: 1.5px solid rgba(55, 189, 248, 0.55);
        border-radius: 999px;
        background: rgba(55, 189, 248, 0.06);
      }
      [data-composition-id="01-hook"] .s1-headline {
        font-family: "Montserrat", sans-serif;
        font-weight: 700;
        font-size: 92px;
        line-height: 1.04;
        letter-spacing: -0.015em;
        color: #ffffff;
        text-shadow: 0 0 24px rgba(7, 18, 28, 0.8);
        margin: 0;
      }
      [data-composition-id="01-hook"] .s1-headline .w {
        display: inline-block;
        margin-right: 18px;
      }
      [data-composition-id="01-hook"] .s1-headline .accent {
        color: #37bdf8;
      }
      [data-composition-id="01-hook"] .s1-rule {
        width: 180px;
        height: 3px;
        background: #37bdf8;
        transform-origin: left center;
        box-shadow: 0 0 18px rgba(55, 189, 248, 0.6);
      }

      /* ---------- Diagram beat ---------- */
      [data-composition-id="01-hook"] .s1-diagram {
        position: absolute;
        left: 0;
        top: 400px;
        width: 1440px;
        height: 620px;
      }
      [data-composition-id="01-hook"] .s1-halo {
        position: absolute;
        left: 300px;
        top: 10px;
        width: 620px;
        height: 620px;
        border: 2px dashed rgba(55, 189, 248, 0.55);
        border-radius: 50%;
        transform-origin: center center;
      }
      [data-composition-id="01-hook"] .s1-halo-label {
        position: absolute;
        left: 515px;
        top: -22px;
        font-family: "Roboto Mono", monospace;
        font-weight: 500;
        font-size: 16px;
        letter-spacing: 0.32em;
        color: #96a2b6;
        text-transform: uppercase;
        padding: 8px 18px;
        background: #07121c;
      }
      [data-composition-id="01-hook"] .s1-project {
        position: absolute;
        left: 450px;
        top: 235px;
        width: 320px;
        height: 150px;
        background: linear-gradient(180deg, #37bdf8 0%, #2aa3dc 100%);
        border-radius: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 6px;
        box-shadow:
          0 0 60px rgba(55, 189, 248, 0.35),
          0 20px 40px rgba(0, 0, 0, 0.35);
        color: #07121c;
      }
      [data-composition-id="01-hook"] .s1-project-label {
        font-family: "Montserrat", sans-serif;
        font-weight: 900;
        font-size: 36px;
        letter-spacing: 0.04em;
      }
      [data-composition-id="01-hook"] .s1-project-sub {
        font-family: "Roboto Mono", monospace;
        font-weight: 500;
        font-size: 15px;
        letter-spacing: 0.12em;
        color: rgba(7, 18, 28, 0.75);
      }
      [data-composition-id="01-hook"] .s1-problem {
        position: absolute;
        font-family: "Roboto Mono", monospace;
        font-weight: 700;
        font-size: 22px;
        letter-spacing: 0.16em;
        color: #ffffff;
        padding: 14px 22px 14px 18px;
        background: rgba(13, 32, 49, 0.95);
        border: 1.5px solid rgba(240, 144, 37, 0.65);
        border-radius: 14px;
        display: flex;
        align-items: center;
        gap: 12px;
        box-shadow:
          0 12px 28px rgba(0, 0, 0, 0.45),
          0 0 28px rgba(240, 144, 37, 0.18);
        white-space: nowrap;
      }
      [data-composition-id="01-hook"] .s1-problem-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #f09025;
        box-shadow: 0 0 14px rgba(240, 144, 37, 0.9);
      }
      /* Problem bubble placement — scattered around the halo, outside the project box */
      [data-composition-id="01-hook"] .s1-p1 {
        left: 70px;
        top: 120px;
      }
      [data-composition-id="01-hook"] .s1-p2 {
        left: 920px;
        top: 100px;
      }
      [data-composition-id="01-hook"] .s1-p3 {
        left: 90px;
        top: 450px;
      }
      [data-composition-id="01-hook"] .s1-p4 {
        left: 920px;
        top: 460px;
      }
      [data-composition-id="01-hook"] .s1-question {
        position: absolute;
        left: 560px;
        top: 30px;
        font-family: "Montserrat", sans-serif;
        font-weight: 900;
        font-size: 180px;
        line-height: 0.9;
        color: #f09025;
        text-shadow:
          0 0 40px rgba(240, 144, 37, 0.9),
          0 0 80px rgba(240, 144, 37, 0.4);
        letter-spacing: 0.05em;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });
        const sel = (s) => '[data-composition-id="01-hook"] ' + s;

        /* ----- Title beat ----- */
        // t=0.30 Lesson pill
        tl.from(sel(".s1-pill"), { y: -24, opacity: 0, duration: 0.55, ease: "power3.out" }, 0.30);
        // t=0.50 Headline words stagger in (matches "When / and / how / to / pitch / an / audit")
        tl.from(sel(".s1-headline .w"), {
          y: 50,
          opacity: 0,
          rotationX: -40,
          duration: 0.70,
          ease: "power4.out",
          stagger: 0.085,
        }, 0.50);
        // t=1.90 Rule line grows
        tl.from(sel(".s1-rule"), { scaleX: 0, duration: 0.55, ease: "expo.out" }, 1.90);

        /* ----- Diagram beat ----- */
        // t=4.70 ("project" = 5.46) — project box bounces in a hair early so the word hits the hero state
        tl.from(sel(".s1-project"), {
          scale: 0.4,
          opacity: 0,
          duration: 0.65,
          ease: "back.out(1.8)",
        }, 4.70);

        // t=7.30 ("The client's business...") — halo draws in
        tl.from(sel(".s1-halo"), {
          scale: 0.55,
          opacity: 0,
          duration: 0.90,
          ease: "expo.out",
          transformOrigin: "center center",
        }, 7.10);
        tl.from(sel(".s1-halo-label"), {
          y: -12,
          opacity: 0,
          duration: 0.45,
          ease: "power3.out",
        }, 7.60);

        // t=10.68 ("inefficiencies") — first problem bubble
        tl.from(sel(".s1-p1"), {
          scale: 0.2,
          opacity: 0,
          x: -40,
          duration: 0.55,
          ease: "back.out(2)",
        }, 10.58);

        // t=11.42 ("workflows") — second problem bubble
        tl.from(sel(".s1-p2"), {
          scale: 0.2,
          opacity: 0,
          x: 40,
          duration: 0.55,
          ease: "back.out(2)",
        }, 11.40);

        // t=15.00 ("single automation") — third problem bubble
        tl.from(sel(".s1-p3"), {
          scale: 0.2,
          opacity: 0,
          y: 40,
          duration: 0.55,
          ease: "back.out(2)",
        }, 14.80);

        // t=16.50 ("say something" = 16.62) — fourth problem bubble
        tl.from(sel(".s1-p4"), {
          scale: 0.2,
          opacity: 0,
          y: 40,
          duration: 0.55,
          ease: "back.out(2)",
        }, 16.45);

        // t=17.58 ("But you won't be sure how") — ??? payoff
        tl.from(sel(".s1-question"), {
          scale: 0.25,
          opacity: 0,
          rotation: -12,
          duration: 0.75,
          ease: "back.out(2.5)",
        }, 17.50);

        // Pad to section duration
        tl.set({}, {}, 19);

        window.__timelines = window.__timelines || {};
        window.__timelines["01-hook"] = tl;
      })();
    </script>
  </div>
</template>
