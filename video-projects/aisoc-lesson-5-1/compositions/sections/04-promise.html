<template id="04-promise-template">

        <div class="s4-card-icon">

        <div class="s4-card-title">HOW</div>
        <div class="s4-card-sub">to pitch so the client feels <span class="s4-hot">helped</span>, not <span class="s4-cold">sold</span></div>
        <div class="s4-card-icon">
          <div class="s4-bubble-row">
            <div class="s4-bubble s4-bubble-you"></div>
            <div class="s4-bubble s4-bubble-them"></div>

      </div>
      <div class="s4-card" id="s4-c3">
        <div class="s4-card-num">03</div>
        <div class="s4-card-title">CHARGE?</div>
        <div class="s4-card-sub">whether to bill for it at all</div>
        <div class="s4-card-icon">

    <style>

      [data-composition-id="04-promise"] .s4-arrow { font-family: "Roboto Mono", monospace; font-size: 34px; color: #37bdf8; text-shadow: 0 0 12px rgba(55,189,248,0.7); }

      [data-composition-id="04-promise"] .s4-bubble-them { background: rgba(255,255,255,0.12); border: 1.5px solid #96a2b6; position: relative; }

      [data-composition-id="04-promise"] .s4-coin { width: 120px; height: 120px; border: 4px solid #f09025; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: "Montserrat", sans-serif; font-weight: 900; font-size: 76px; color: #f09025; box-shadow: 0 0 30px rgba(240,144,37,0.35); text-shadow: 0 0 14px rgba(240,144,37,0.5); }

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {

        const sel = (s) => '[data-composition-id="04-promise"] ' + s;
        // Kicker row at local 0 ("That's what this lesson is for")
        tl.from(sel(".s4-kicker"), { opacity: 0, x: -16, duration: 0.4, ease: "power3.out" }, 0);
        tl.from(sel(".s4-arrow"), { opacity: 0, scale: 0.4, duration: 0.4, ease: "back.out(2)" }, 0.35);
        tl.from(sel(".s4-kicker-outcome"), { opacity: 0, x: 20, duration: 0.45, ease: "power3.out" }, 0.55);
        // Card 01 WHEN at "when" (abs 41.50 -> local 3.16)

        tl.from(sel("#s4-c1 .s4-clock"), { scale: 0, rotation: -90, duration: 0.55, ease: "back.out(2)" }, 3.35);

        tl.set({}, {}, 10.62);
        window.__timelines = window.__timelines || {};
        window.__timelines["04-promise"] = tl;
