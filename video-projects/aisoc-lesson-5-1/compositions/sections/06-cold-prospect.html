<template id="06-cold-prospect-template">
  <div
    data-composition-id="06-cold-prospect"
    data-start="0"
    data-width="1920"
    data-height="1080"
    data-duration="14.10"
  >
    <div class="s6-top">
      <span class="s6-top-kicker">NO TRUST YET?</span>
      <span class="s6-top-tag s6-stamp">PREMATURE</span>
    </div>

    <!-- Simulated DM/email exchange -->
    <div class="s6-convo">
      <div class="s6-convo-title">WHAT ACTUALLY HAPPENS</div>

      <!-- Client's incoming ask -->
      <div class="s6-msg s6-msg-in" id="s6-msg1">
        <div class="s6-avatar s6-avatar-client">C</div>
        <div class="s6-bubble s6-bubble-in">
          <div class="s6-bubble-meta">CLIENT · cold inbound</div>
          <div class="s6-bubble-text">“Can you fix our <span class="s6-hot">reporting</span>?”</div>
        </div>
      </div>

      <!-- Wrong response -->
      <div class="s6-msg s6-msg-out" id="s6-msg2">
        <div class="s6-bubble s6-bubble-out s6-bubble-wrong">
          <div class="s6-bubble-meta">YOU · wrong move</div>
          <div class="s6-bubble-text">“Let's <span class="s6-u">step back</span> and <span class="s6-u">audit</span> your operations.”</div>
          <div class="s6-big-x">✕</div>
        </div>
        <div class="s6-avatar s6-avatar-you">You</div>
      </div>

      <!-- Right move (cyan) -->
      <div class="s6-right-move" id="s6-right">
        <div class="s6-right-check">✓</div>
        <div class="s6-right-text">JUST FIX THE REPORTING.</div>
      </div>
    </div>

    <!-- Departure: client moves to next vendor -->
    <div class="s6-depart" id="s6-depart">
      <div class="s6-depart-label">OR ELSE</div>
      <div class="s6-depart-flow">
        <div class="s6-depart-client">CLIENT</div>
        <div class="s6-depart-arrow">→</div>
        <div class="s6-depart-next">NEXT VENDOR</div>
      </div>
    </div>

    <style>
      [data-composition-id="06-cold-prospect"] { position: absolute; inset: 0; font-family: "Montserrat", sans-serif; }
      [data-composition-id="06-cold-prospect"] .s6-top { position: absolute; top: 90px; left: 120px; display: flex; align-items: center; gap: 20px; }
      [data-composition-id="06-cold-prospect"] .s6-top-kicker { font-family: "Roboto Mono", monospace; font-weight: 500; font-size: 22px; letter-spacing: 0.32em; color: #96a2b6; text-transform: uppercase; }
      [data-composition-id="06-cold-prospect"] .s6-stamp { font-family: "Montserrat", sans-serif; font-weight: 900; font-size: 44px; letter-spacing: 0.04em; color: #f09025; padding: 8px 22px; border: 3px solid #f09025; border-radius: 10px; transform: rotate(-3deg); box-shadow: 0 0 28px rgba(240,144,37,0.5); text-shadow: 0 0 14px rgba(240,144,37,0.5); }

      [data-composition-id="06-cold-prospect"] .s6-convo { position: absolute; top: 200px; left: 120px; width: 1260px; display: flex; flex-direction: column; gap: 16px; }
      [data-composition-id="06-cold-prospect"] .s6-convo-title { font-family: "Roboto Mono", monospace; font-weight: 500; font-size: 18px; letter-spacing: 0.28em; color: #96a2b6; text-transform: uppercase; }
      [data-composition-id="06-cold-prospect"] .s6-msg { display: flex; align-items: flex-start; gap: 16px; }
      [data-composition-id="06-cold-prospect"] .s6-msg-in { justify-content: flex-start; }
      [data-composition-id="06-cold-prospect"] .s6-msg-out { justify-content: flex-start; padding-left: 60px; }
      [data-composition-id="06-cold-prospect"] .s6-avatar { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: "Roboto Mono", monospace; font-weight: 700; font-size: 18px; flex: none; }
      [data-composition-id="06-cold-prospect"] .s6-avatar-client { background: #96a2b6; color: #07121c; }
      [data-composition-id="06-cold-prospect"] .s6-avatar-you { background: #37bdf8; color: #07121c; font-size: 14px; letter-spacing: 0.05em; }
      [data-composition-id="06-cold-prospect"] .s6-bubble { padding: 16px 22px; border-radius: 18px; max-width: 860px; }
      [data-composition-id="06-cold-prospect"] .s6-bubble-in { background: rgba(255,255,255,0.09); border: 1px solid rgba(150,162,182,0.35); }
      [data-composition-id="06-cold-prospect"] .s6-bubble-out { position: relative; }
      [data-composition-id="06-cold-prospect"] .s6-bubble-wrong { background: rgba(240,144,37,0.10); border: 1.5px solid rgba(240,144,37,0.55); }
      [data-composition-id="06-cold-prospect"] .s6-bubble-meta { font-family: "Roboto Mono", monospace; font-weight: 500; font-size: 13px; letter-spacing: 0.22em; color: #96a2b6; text-transform: uppercase; margin-bottom: 4px; }
      [data-composition-id="06-cold-prospect"] .s6-bubble-text { font-family: "Montserrat", sans-serif; font-weight: 500; font-size: 30px; line-height: 1.3; color: #ffffff; }
      [data-composition-id="06-cold-prospect"] .s6-hot { color: #37bdf8; font-weight: 700; }
      [data-composition-id="06-cold-prospect"] .s6-u { color: #f09025; text-decoration: line-through; text-decoration-thickness: 2px; }
      [data-composition-id="06-cold-prospect"] .s6-big-x { position: absolute; top: -22px; right: -22px; width: 68px; height: 68px; border-radius: 50%; background: #f09025; color: #ffffff; display: flex; align-items: center; justify-content: center; font-family: "Montserrat", sans-serif; font-weight: 900; font-size: 40px; box-shadow: 0 0 28px rgba(240,144,37,0.7); transform-origin: center center; }

      [data-composition-id="06-cold-prospect"] .s6-right-move { margin-top: 8px; margin-left: 60px; display: flex; align-items: center; gap: 16px; padding: 14px 22px; background: rgba(55,189,248,0.12); border: 1.5px solid rgba(55,189,248,0.6); border-radius: 999px; align-self: flex-start; box-shadow: 0 0 22px rgba(55,189,248,0.22); width: fit-content; }
      [data-composition-id="06-cold-prospect"] .s6-right-check { width: 40px; height: 40px; border-radius: 50%; background: #37bdf8; color: #07121c; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 22px; }
      [data-composition-id="06-cold-prospect"] .s6-right-text { font-family: "Roboto Mono", monospace; font-weight: 700; font-size: 20px; letter-spacing: 0.18em; color: #37bdf8; }

      [data-composition-id="06-cold-prospect"] .s6-depart { position: absolute; top: 890px; left: 120px; display: flex; flex-direction: column; gap: 6px; }
      [data-composition-id="06-cold-prospect"] .s6-depart-label { font-family: "Roboto Mono", monospace; font-weight: 500; font-size: 14px; letter-spacing: 0.32em; color: #96a2b6; }
      [data-composition-id="06-cold-prospect"] .s6-depart-flow { display: flex; align-items: center; gap: 20px; font-family: "Montserrat", sans-serif; font-weight: 900; font-size: 36px; }
      [data-composition-id="06-cold-prospect"] .s6-depart-client { color: #96a2b6; opacity: 0.75; letter-spacing: 0.04em; }
      [data-composition-id="06-cold-prospect"] .s6-depart-arrow { color: #f09025; font-family: "Roboto Mono", monospace; font-size: 42px; }
      [data-composition-id="06-cold-prospect"] .s6-depart-next { color: #f09025; letter-spacing: 0.04em; text-shadow: 0 0 18px rgba(240,144,37,0.5); }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        const tl = gsap.timeline({ paused: true });
        const sel = (s) => '[data-composition-id="06-cold-prospect"] ' + s;

        // Top kicker at local 0 ("If neither of those is true")
        tl.from(sel(".s6-top-kicker"), { opacity: 0, x: -18, duration: 0.4, ease: "power3.out" }, 0);
        // PREMATURE stamp at "premature" (abs 71.84 -> local 2.20)
        tl.from(sel(".s6-stamp"), { opacity: 0, scale: 0.4, rotation: 12, duration: 0.55, ease: "back.out(2.2)" }, 2.05);
        // Convo heading at "a cold prospect" (abs 72.74 -> local 3.10)
        tl.from(sel(".s6-convo-title"), { opacity: 0, y: -10, duration: 0.35, ease: "power3.out" }, 3.00);
        // Client bubble at "reached out about a specific reporting" — bubble enters when "reporting" lands (abs 74.74 -> local 5.10)
        tl.from(sel("#s6-msg1"), { opacity: 0, x: -30, duration: 0.5, ease: "power3.out" }, 3.45);
        tl.from(sel("#s6-msg1 .s6-hot"), { color: "#ffffff", duration: 0.3, ease: "none" }, 5.10);
        // Your wrong reply at "let's step back and audit" (abs 76.94 -> local 7.30)
        tl.from(sel("#s6-msg2"), { opacity: 0, y: 20, duration: 0.5, ease: "power3.out" }, 6.85);
        // Underlines on "step back" and "audit" activate near their words but they're baked via CSS; here we pop the big X at "audit your operations" (abs 77.94 -> local 8.30)
        tl.from(sel(".s6-big-x"), { scale: 0, rotation: -45, opacity: 0, duration: 0.45, ease: "back.out(2.5)" }, 8.20);
        // Right-move pill at "They want the reporting problem fixed" (abs 79.56 -> local 9.92)
        tl.from(sel("#s6-right"), { opacity: 0, x: -30, duration: 0.5, ease: "expo.out" }, 9.82);
        // Departure at "they'll find someone else" (abs 81.06 -> local 11.42)
        tl.from(sel(".s6-depart-label"), { opacity: 0, y: -8, duration: 0.35, ease: "power3.out" }, 11.30);
        tl.from(sel(".s6-depart-client"), { opacity: 0, x: -30, duration: 0.4, ease: "power3.out" }, 11.55);
        tl.from(sel(".s6-depart-arrow"), { opacity: 0, x: -20, duration: 0.4, ease: "power3.out" }, 11.85);
        tl.from(sel(".s6-depart-next"), { opacity: 0, x: -20, duration: 0.45, ease: "power3.out" }, 12.10);

        tl.set({}, {}, 14.10);
        window.__timelines = window.__timelines || {};
        window.__timelines["06-cold-prospect"] = tl;
      })();
    </script>
  </div>
</template>
