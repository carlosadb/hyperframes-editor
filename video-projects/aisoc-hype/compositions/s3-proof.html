<template id="s3-proof-template">
  <div data-composition-id="s3-proof" data-start="0" data-duration="6" data-width="1920" data-height="1080">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;900&family=Roboto+Mono:wght@400;500;700&display=block" />

    <div class="scene">
      <!-- Section header -->
      <div class="header">
        <div class="hdr-pill">
          <span class="hdr-dot"></span>
          <span class="hdr-txt">LIVE OPS</span>
        </div>
        <div class="hdr-title">THE NUMBERS DON'T LIE.</div>
      </div>

      <!-- Three stat cards -->
      <div class="cards">
        <div class="card" data-card="1">
          <div class="card-num-wrap">
            <span class="card-num" id="s3-num-1">0</span>
            <span class="card-plus">+</span>
          </div>
          <div class="card-label">MEMBERS</div>
          <div class="card-sub">IN THE SOCIETY</div>
          <div class="card-corner tl"></div>
          <div class="card-corner tr"></div>
          <div class="card-corner bl"></div>
          <div class="card-corner br"></div>
        </div>

        <div class="card" data-card="2">
          <div class="card-num-wrap">
            <span class="card-num" id="s3-num-2">0</span>
            <span class="card-plus">+</span>
          </div>
          <div class="card-label">AI AGENTS</div>
          <div class="card-sub">SHIPPED BY BEGINNERS</div>
          <div class="card-corner tl"></div>
          <div class="card-corner tr"></div>
          <div class="card-corner bl"></div>
          <div class="card-corner br"></div>
        </div>

        <div class="card" data-card="3">
          <div class="card-num-wrap">
            <span class="card-num" id="s3-num-3">0</span>
            <span class="card-plus">K</span>
          </div>
          <div class="card-label">YOUTUBE</div>
          <div class="card-sub">SUBSCRIBERS &amp; GROWING</div>
          <div class="card-corner tl"></div>
          <div class="card-corner tr"></div>
          <div class="card-corner bl"></div>
          <div class="card-corner br"></div>
        </div>
      </div>

      <!-- Bottom ticker -->
      <div class="ticker">
        <span class="tk-piece">» TRUSTED BY SOLOPRENEURS</span>
        <span class="tk-piece accent">» AGENCY OWNERS</span>
        <span class="tk-piece">» CORPORATE TEAMS</span>
        <span class="tk-piece accent">» CONSULTANTS</span>
      </div>
    </div>

    <style>
      [data-composition-id="s3-proof"] {
        position: absolute;
        inset: 0;
        background: #07121c;
        color: #ffffff;
        font-family: "Montserrat", sans-serif;
        overflow: hidden;
      }
      [data-composition-id="s3-proof"] .scene {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 58px;
        padding: 120px 140px;
        box-sizing: border-box;
      }

      [data-composition-id="s3-proof"] .header {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 20px;
      }
      [data-composition-id="s3-proof"] .hdr-pill {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        padding: 8px 18px;
        border: 1.5px solid #37bdf8;
        border-radius: 999px;
      }
      [data-composition-id="s3-proof"] .hdr-dot {
        width: 10px;
        height: 10px;
        background: #37bdf8;
        border-radius: 50%;
        box-shadow: 0 0 10px rgba(55, 189, 248, 0.9);
      }
      [data-composition-id="s3-proof"] .hdr-txt {
        font-family: "Roboto Mono", monospace;
        font-weight: 500;
        font-size: 18px;
        color: #37bdf8;
        letter-spacing: 0.22em;
      }
      [data-composition-id="s3-proof"] .hdr-title {
        font-family: "Montserrat", sans-serif;
        font-weight: 900;
        font-size: 78px;
        color: #ffffff;
        letter-spacing: -0.02em;
        line-height: 1;
      }

      [data-composition-id="s3-proof"] .cards {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 28px;
      }
      [data-composition-id="s3-proof"] .card {
        position: relative;
        background: #0d2031;
        border: 1px solid #252d33;
        padding: 44px 36px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        min-height: 280px;
        overflow: hidden;
      }
      [data-composition-id="s3-proof"] .card-num-wrap {
        display: flex;
        align-items: baseline;
        gap: 10px;
        line-height: 0.92;
      }
      [data-composition-id="s3-proof"] .card-num {
        font-family: "Montserrat", sans-serif;
        font-weight: 900;
        font-size: 112px;
        color: #37bdf8;
        letter-spacing: -0.04em;
        font-variant-numeric: tabular-nums;
        line-height: 0.9;
      }
      [data-composition-id="s3-proof"] .card-plus {
        font-family: "Montserrat", sans-serif;
        font-weight: 700;
        font-size: 50px;
        color: #37bdf8;
        letter-spacing: -0.02em;
      }
      [data-composition-id="s3-proof"] .card-label {
        font-family: "Montserrat", sans-serif;
        font-weight: 700;
        font-size: 32px;
        color: #ffffff;
        letter-spacing: 0.06em;
      }
      [data-composition-id="s3-proof"] .card-sub {
        font-family: "Roboto Mono", monospace;
        font-weight: 500;
        font-size: 15px;
        color: #96a2b6;
        letter-spacing: 0.18em;
      }

      [data-composition-id="s3-proof"] .card-corner {
        position: absolute;
        width: 22px;
        height: 22px;
      }
      [data-composition-id="s3-proof"] .card-corner.tl { top: -1px; left: -1px; border-top: 2px solid #37bdf8; border-left: 2px solid #37bdf8; }
      [data-composition-id="s3-proof"] .card-corner.tr { top: -1px; right: -1px; border-top: 2px solid #37bdf8; border-right: 2px solid #37bdf8; }
      [data-composition-id="s3-proof"] .card-corner.bl { bottom: -1px; left: -1px; border-bottom: 2px solid #37bdf8; border-left: 2px solid #37bdf8; }
      [data-composition-id="s3-proof"] .card-corner.br { bottom: -1px; right: -1px; border-bottom: 2px solid #37bdf8; border-right: 2px solid #37bdf8; }

      [data-composition-id="s3-proof"] .ticker {
        display: flex;
        gap: 48px;
        align-items: center;
        font-family: "Roboto Mono", monospace;
        font-weight: 500;
        font-size: 18px;
        color: #96a2b6;
        letter-spacing: 0.16em;
        border-top: 1px solid #252d33;
        padding-top: 24px;
        white-space: nowrap;
      }
      [data-composition-id="s3-proof"] .tk-piece.accent {
        color: #37bdf8;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true, defaults: { ease: "power3.out" } });

        const root = '[data-composition-id="s3-proof"]';

        // Header
        tl.from(root + " .hdr-pill", { autoAlpha: 0, x: -30, duration: 0.4, ease: "expo.out" }, 0.1);
        tl.from(root + " .hdr-dot", { scale: 0, duration: 0.3, ease: "back.out(2)" }, 0.2);
        tl.from(root + " .hdr-title", { autoAlpha: 0, y: 40, duration: 0.55, ease: "power4.out" }, 0.25);

        // Cards enter in sequence
        tl.from(root + " .card", {
          autoAlpha: 0,
          y: 60,
          scale: 0.94,
          duration: 0.5,
          stagger: 0.15,
          ease: "back.out(1.5)",
        }, 0.7);

        // Corners flick in after card enters
        tl.from(root + " .card-corner", {
          autoAlpha: 0,
          scale: 0,
          duration: 0.3,
          stagger: 0.015,
          ease: "expo.out",
        }, 0.95);

        // Labels
        tl.from(root + " .card-label, " + root + " .card-sub", {
          autoAlpha: 0,
          y: 16,
          duration: 0.4,
          stagger: 0.03,
          ease: "power2.out",
        }, 1.0);

        // Plus signs
        tl.from(root + " .card-plus", {
          autoAlpha: 0,
          x: -14,
          duration: 0.35,
          stagger: 0.15,
          ease: "expo.out",
        }, 1.15);

        // Number count-ups — sequential for impact
        tl.fromTo("#s3-num-1",
          { innerText: 0 },
          { innerText: 300000, duration: 1.0, ease: "power2.out", snap: { innerText: 1 },
            onUpdate() {
              const n = Math.round(this.targets()[0].innerText || 0);
              this.targets()[0].innerText = n.toLocaleString("en-US");
            }
          }, 1.1);

        tl.fromTo("#s3-num-2",
          { innerText: 0 },
          { innerText: 3400, duration: 0.9, ease: "power2.out", snap: { innerText: 1 },
            onUpdate() {
              const n = Math.round(this.targets()[0].innerText || 0);
              this.targets()[0].innerText = n.toLocaleString("en-US");
            }
          }, 1.5);

        tl.fromTo("#s3-num-3",
          { innerText: 0 },
          { innerText: 600, duration: 0.9, ease: "power2.out", snap: { innerText: 1 } }, 1.9);

        // Pulse each card accent after its number lands
        tl.to(root + " .card[data-card='1']", {
          borderColor: "#37bdf8",
          duration: 0.3,
          ease: "power2.inOut",
          yoyo: true,
          repeat: 1,
        }, 2.1);

        tl.to(root + " .card[data-card='2']", {
          borderColor: "#37bdf8",
          duration: 0.3,
          ease: "power2.inOut",
          yoyo: true,
          repeat: 1,
        }, 2.5);

        tl.to(root + " .card[data-card='3']", {
          borderColor: "#37bdf8",
          duration: 0.3,
          ease: "power2.inOut",
          yoyo: true,
          repeat: 1,
        }, 2.9);

        // Ticker line
        tl.from(root + " .ticker", {
          autoAlpha: 0,
          y: 18,
          duration: 0.5,
          ease: "power3.out",
        }, 3.8);

        tl.from(root + " .tk-piece", {
          autoAlpha: 0,
          x: 24,
          duration: 0.35,
          stagger: 0.06,
          ease: "power2.out",
        }, 3.95);

        // Pad to 6s
        tl.set({}, {}, 6);

        window.__timelines["s3-proof"] = tl;
      })();
    </script>
  </div>
</template>
