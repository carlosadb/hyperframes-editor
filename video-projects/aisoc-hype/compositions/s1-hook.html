<template id="s1-hook-template">
  <div data-composition-id="s1-hook" data-start="0" data-duration="5" data-width="1920" data-height="1080">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;900&family=Roboto+Mono:wght@400;500;700&display=block" />

    <div class="scene">
      <!-- BEAT 1 (0-2s): Terminal prompt line -->
      <div class="terminal-line">
        <span class="term-prompt">&gt;_</span>
        <span class="term-text">Still trading hours for dollars?</span>
        <span class="term-caret"></span>
      </div>

      <!-- BEAT 2 (2-3.5s): Bold statement, each word separate -->
      <div class="statement">
        <div class="stmt-lbl">TRANSMISSION // 04.17.2026</div>
        <div class="stmt-row">
          <span class="stmt-word">AI</span>
          <span class="stmt-word">IS</span>
          <span class="stmt-word">CHANGING</span>
        </div>
        <div class="stmt-row">
          <span class="stmt-word">WHO</span>
          <span class="stmt-word">GETS</span>
          <span class="stmt-word accent">PAID.</span>
        </div>
      </div>

      <!-- BEAT 3 (3.5-5s): Ambient crosshair + corner tick marks -->
      <div class="crosshair" aria-hidden="true">
        <div class="ch-v"></div>
        <div class="ch-h"></div>
        <div class="ch-dot"></div>
      </div>
      <div class="tick tl"></div>
      <div class="tick tr"></div>
      <div class="tick bl"></div>
      <div class="tick br"></div>
    </div>

    <style>
      [data-composition-id="s1-hook"] {
        position: absolute;
        inset: 0;
        background: #07121c;
        color: #ffffff;
        font-family: "Montserrat", sans-serif;
        overflow: hidden;
      }
      [data-composition-id="s1-hook"] .scene {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-start;
        padding: 180px 200px;
        box-sizing: border-box;
        gap: 60px;
      }
      [data-composition-id="s1-hook"] .terminal-line {
        font-family: "Roboto Mono", monospace;
        font-weight: 500;
        font-size: 36px;
        color: #96a2b6;
        letter-spacing: 0.02em;
        display: flex;
        align-items: center;
        gap: 16px;
      }
      [data-composition-id="s1-hook"] .term-prompt {
        color: #37bdf8;
        font-weight: 700;
      }
      [data-composition-id="s1-hook"] .term-caret {
        display: inline-block;
        width: 14px;
        height: 34px;
        background: #37bdf8;
        margin-left: 4px;
      }
      [data-composition-id="s1-hook"] .statement {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      [data-composition-id="s1-hook"] .stmt-lbl {
        font-family: "Roboto Mono", monospace;
        font-weight: 500;
        font-size: 18px;
        color: #37bdf8;
        letter-spacing: 0.18em;
        margin-bottom: 18px;
      }
      [data-composition-id="s1-hook"] .stmt-row {
        display: flex;
        gap: 38px;
        line-height: 1;
      }
      [data-composition-id="s1-hook"] .stmt-word {
        font-family: "Montserrat", sans-serif;
        font-weight: 900;
        font-size: 150px;
        letter-spacing: -0.03em;
        color: #ffffff;
        display: inline-block;
      }
      [data-composition-id="s1-hook"] .stmt-word.accent {
        color: #37bdf8;
      }
      [data-composition-id="s1-hook"] .crosshair {
        position: absolute;
        top: 50%;
        right: 140px;
        width: 140px;
        height: 140px;
        margin-top: -70px;
      }
      [data-composition-id="s1-hook"] .ch-v {
        position: absolute;
        top: 0;
        left: 50%;
        width: 1.5px;
        height: 100%;
        background: rgba(55, 189, 248, 0.35);
        transform: translateX(-50%);
      }
      [data-composition-id="s1-hook"] .ch-h {
        position: absolute;
        left: 0;
        top: 50%;
        height: 1.5px;
        width: 100%;
        background: rgba(55, 189, 248, 0.35);
        transform: translateY(-50%);
      }
      [data-composition-id="s1-hook"] .ch-dot {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 10px;
        height: 10px;
        background: #37bdf8;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        box-shadow: 0 0 18px rgba(55, 189, 248, 0.9);
      }
      [data-composition-id="s1-hook"] .tick {
        position: absolute;
        width: 40px;
        height: 40px;
      }
      [data-composition-id="s1-hook"] .tick.tl {
        top: 60px;
        left: 60px;
        border-top: 2px solid #37bdf8;
        border-left: 2px solid #37bdf8;
      }
      [data-composition-id="s1-hook"] .tick.tr {
        top: 60px;
        right: 60px;
        border-top: 2px solid #37bdf8;
        border-right: 2px solid #37bdf8;
      }
      [data-composition-id="s1-hook"] .tick.bl {
        bottom: 60px;
        left: 60px;
        border-bottom: 2px solid #37bdf8;
        border-left: 2px solid #37bdf8;
      }
      [data-composition-id="s1-hook"] .tick.br {
        bottom: 60px;
        right: 60px;
        border-bottom: 2px solid #37bdf8;
        border-right: 2px solid #37bdf8;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true, defaults: { ease: "power3.out" } });

        const root = '[data-composition-id="s1-hook"]';

        // Start states for ALL elements (entrance-only discipline)
        tl.set(root + " .statement", { autoAlpha: 0 }, 0);
        tl.set(root + " .crosshair", { autoAlpha: 0 }, 0);
        tl.set(root + " .tick", { autoAlpha: 0 }, 0);

        // BEAT 1 (0.1-2.0s): Corner ticks flicker in + terminal prompt types out
        tl.from(root + " .tick", { autoAlpha: 0, scale: 0.6, duration: 0.3, stagger: 0.05, ease: "expo.out" }, 0.15);

        tl.from(root + " .term-prompt", { autoAlpha: 0, x: -12, duration: 0.25, ease: "expo.out" }, 0.25);

        // Typewriter: reveal the text word-by-word via clip-path
        tl.fromTo(root + " .term-text",
          { clipPath: "inset(0 100% 0 0)", autoAlpha: 1 },
          { clipPath: "inset(0 0% 0 0)", duration: 1.2, ease: "steps(24)" }, 0.45);

        // Blinking caret (finite repeat count based on scene length)
        tl.fromTo(root + " .term-caret",
          { autoAlpha: 0.2 },
          { autoAlpha: 1, duration: 0.5, ease: "steps(1)", repeat: 3, yoyo: true }, 0.5);

        // BEAT 2 (2.0-3.5s): Terminal dims + bold statement slams in
        tl.to(root + " .terminal-line", { autoAlpha: 0.18, duration: 0.3, ease: "power2.inOut" }, 2.0);

        tl.fromTo(root + " .statement",
          { autoAlpha: 0, y: 20 },
          { autoAlpha: 1, y: 0, duration: 0.3, ease: "power2.out" }, 2.1);

        tl.from(root + " .stmt-lbl", { autoAlpha: 0, x: -30, duration: 0.35, ease: "expo.out" }, 2.1);

        // First row: word-by-word slam
        tl.from(root + " .stmt-row:nth-of-type(2) .stmt-word", {
          autoAlpha: 0,
          y: 80,
          scale: 0.92,
          duration: 0.45,
          ease: "back.out(1.6)",
          stagger: 0.08,
        }, 2.3);

        // Second row: slight offset, different feel
        tl.from(root + " .stmt-row:nth-of-type(3) .stmt-word", {
          autoAlpha: 0,
          y: 80,
          scale: 0.92,
          duration: 0.45,
          ease: "back.out(1.8)",
          stagger: 0.09,
        }, 2.75);

        // Accent word gets a glow pulse
        tl.fromTo(root + " .stmt-word.accent",
          { textShadow: "0 0 0 rgba(55,189,248,0)" },
          { textShadow: "0 0 40px rgba(55,189,248,0.85)", duration: 0.4, ease: "power2.out" }, 3.2);

        // BEAT 3 (3.5-5.0s): Crosshair tracks in, scene is fully composed
        tl.from(root + " .crosshair", {
          autoAlpha: 0,
          scale: 0.4,
          duration: 0.5,
          ease: "power4.out",
        }, 3.55);

        tl.to(root + " .ch-dot", {
          scale: 1.25,
          duration: 0.5,
          ease: "sine.inOut",
          repeat: 2,
          yoyo: true,
        }, 4.0);

        // Camera push — subtle scale on the whole scene to hand into transition
        tl.to(root + " .scene", {
          scale: 1.025,
          duration: 1.2,
          ease: "power2.in",
          transformOrigin: "50% 50%",
        }, 3.7);

        // Pad to full 5s duration
        tl.set({}, {}, 5);

        window.__timelines["s1-hook"] = tl;
      })();
    </script>
  </div>
</template>
