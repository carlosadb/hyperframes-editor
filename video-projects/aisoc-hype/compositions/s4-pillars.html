<template id="s4-pillars-template">
  <div data-composition-id="s4-pillars" data-start="0" data-duration="8" data-width="1920" data-height="1080">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;900&family=Roboto+Mono:wght@400;500;700&display=block" />

    <div class="scene">
      <!-- Header strip -->
      <div class="strip">
        <div class="strip-l">
          <span class="strip-dot"></span>
          <span>OPERATING PROTOCOL</span>
        </div>
        <div class="strip-r">01 / 03 / 03</div>
      </div>

      <div class="headline">
        THREE STEPS.<span class="hl-accent"> ONE OUTCOME.</span>
      </div>

      <!-- Three pillar columns -->
      <div class="pillars">
        <!-- PILLAR 1: BUILD -->
        <div class="pillar" data-p="1">
          <div class="p-idx">01</div>
          <div class="p-head">BUILD</div>
          <div class="p-sub">AUTOMATIONS THAT WORK</div>
          <!-- n8n-style node chain mockup -->
          <div class="p-mock mock-build">
            <div class="node n1">
              <div class="node-icon"></div>
              <div class="node-lbl">TRIGGER</div>
            </div>
            <div class="connector c12"></div>
            <div class="node n2">
              <div class="node-icon"></div>
              <div class="node-lbl">AGENT</div>
            </div>
            <div class="connector c23"></div>
            <div class="node n3">
              <div class="node-icon"></div>
              <div class="node-lbl">OUTPUT</div>
            </div>
          </div>
        </div>

        <!-- PILLAR 2: SHIP -->
        <div class="pillar" data-p="2">
          <div class="p-idx">02</div>
          <div class="p-head">SHIP</div>
          <div class="p-sub">TO REAL CLIENTS</div>
          <!-- Deploy progress mockup -->
          <div class="p-mock mock-ship">
            <div class="ship-window">
              <div class="sw-bar">
                <span class="sw-lbl">DEPLOY.PRODUCTION</span>
                <span class="sw-pct">98%</span>
              </div>
              <div class="sw-track">
                <div class="sw-fill"></div>
              </div>
              <div class="sw-status">
                <span class="sw-check">✓</span>
                <span>LIVE</span>
              </div>
            </div>
          </div>
        </div>

        <!-- PILLAR 3: GET PAID -->
        <div class="pillar" data-p="3">
          <div class="p-idx">03</div>
          <div class="p-head">GET&nbsp;PAID</div>
          <div class="p-sub">RECURRING REVENUE</div>
          <!-- Invoice stack mockup -->
          <div class="p-mock mock-paid">
            <div class="invoice">
              <div class="inv-row">
                <span class="inv-lbl">RETAINER</span>
                <span class="inv-val">$<span id="s4-p3-v1">0</span></span>
              </div>
              <div class="inv-row">
                <span class="inv-lbl">AGENTS</span>
                <span class="inv-val">$<span id="s4-p3-v2">0</span></span>
              </div>
              <div class="inv-row total">
                <span class="inv-lbl">MONTHLY</span>
                <span class="inv-val accent">$<span id="s4-p3-v3">0</span></span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <style>
      [data-composition-id="s4-pillars"] {
        position: absolute;
        inset: 0;
        background: #07121c;
        color: #ffffff;
        font-family: "Montserrat", sans-serif;
        overflow: hidden;
      }
      [data-composition-id="s4-pillars"] .scene {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        gap: 38px;
        padding: 90px 120px;
        box-sizing: border-box;
      }

      [data-composition-id="s4-pillars"] .strip {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-family: "Roboto Mono", monospace;
        font-weight: 500;
        font-size: 18px;
        color: #96a2b6;
        letter-spacing: 0.22em;
        border-bottom: 1px solid #252d33;
        padding-bottom: 16px;
      }
      [data-composition-id="s4-pillars"] .strip-l {
        display: flex;
        align-items: center;
        gap: 14px;
        color: #37bdf8;
      }
      [data-composition-id="s4-pillars"] .strip-dot {
        width: 10px;
        height: 10px;
        background: #37bdf8;
        border-radius: 50%;
        box-shadow: 0 0 10px rgba(55, 189, 248, 0.9);
      }
      [data-composition-id="s4-pillars"] .strip-r {
        color: #96a2b6;
      }

      [data-composition-id="s4-pillars"] .headline {
        font-family: "Montserrat", sans-serif;
        font-weight: 900;
        font-size: 68px;
        color: #ffffff;
        letter-spacing: -0.02em;
        line-height: 1;
      }
      [data-composition-id="s4-pillars"] .hl-accent {
        color: #37bdf8;
      }

      [data-composition-id="s4-pillars"] .pillars {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 22px;
        flex: 1;
        min-height: 0;
      }
      [data-composition-id="s4-pillars"] .pillar {
        background: #0d2031;
        border: 1px solid #252d33;
        padding: 36px 32px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        position: relative;
      }
      [data-composition-id="s4-pillars"] .p-idx {
        font-family: "Roboto Mono", monospace;
        font-weight: 700;
        font-size: 28px;
        color: #37bdf8;
        letter-spacing: 0.05em;
      }
      [data-composition-id="s4-pillars"] .p-head {
        font-family: "Montserrat", sans-serif;
        font-weight: 900;
        font-size: 74px;
        color: #ffffff;
        letter-spacing: -0.03em;
        line-height: 1;
      }
      [data-composition-id="s4-pillars"] .p-sub {
        font-family: "Roboto Mono", monospace;
        font-weight: 500;
        font-size: 15px;
        color: #96a2b6;
        letter-spacing: 0.2em;
        margin-bottom: 6px;
      }
      [data-composition-id="s4-pillars"] .p-mock {
        flex: 1;
        background: #07121c;
        border: 1px solid #252d33;
        padding: 26px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* PILLAR 1: n8n chain */
      [data-composition-id="s4-pillars"] .mock-build {
        display: flex;
        flex-direction: column;
        gap: 16px;
        align-items: stretch;
      }
      [data-composition-id="s4-pillars"] .node {
        background: #0d2031;
        border: 1.5px solid #37bdf8;
        border-radius: 10px;
        padding: 14px 18px;
        display: flex;
        align-items: center;
        gap: 14px;
        box-shadow: 0 0 18px rgba(55, 189, 248, 0.22);
      }
      [data-composition-id="s4-pillars"] .node-icon {
        width: 28px;
        height: 28px;
        background: #37bdf8;
        border-radius: 6px;
        flex-shrink: 0;
      }
      [data-composition-id="s4-pillars"] .node.n2 .node-icon {
        background: #f09025;
      }
      [data-composition-id="s4-pillars"] .node-lbl {
        font-family: "Roboto Mono", monospace;
        font-weight: 700;
        font-size: 18px;
        color: #ffffff;
        letter-spacing: 0.12em;
      }
      [data-composition-id="s4-pillars"] .connector {
        height: 20px;
        width: 2px;
        background: #37bdf8;
        margin-left: 22px;
        box-shadow: 0 0 8px rgba(55, 189, 248, 0.6);
      }

      /* PILLAR 2: deploy bar */
      [data-composition-id="s4-pillars"] .ship-window {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 18px;
      }
      [data-composition-id="s4-pillars"] .sw-bar {
        display: flex;
        justify-content: space-between;
        font-family: "Roboto Mono", monospace;
        font-weight: 500;
        font-size: 16px;
        color: #96a2b6;
        letter-spacing: 0.14em;
      }
      [data-composition-id="s4-pillars"] .sw-pct {
        color: #37bdf8;
        font-weight: 700;
      }
      [data-composition-id="s4-pillars"] .sw-track {
        height: 14px;
        background: #0d2031;
        border: 1px solid #252d33;
        border-radius: 999px;
        overflow: hidden;
      }
      [data-composition-id="s4-pillars"] .sw-fill {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #0d2031 0%, #37bdf8 100%);
        box-shadow: 0 0 12px rgba(55, 189, 248, 0.8);
        border-radius: 999px;
      }
      [data-composition-id="s4-pillars"] .sw-status {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        font-family: "Roboto Mono", monospace;
        font-weight: 700;
        font-size: 22px;
        color: #37bdf8;
        letter-spacing: 0.2em;
        margin-top: 8px;
      }
      [data-composition-id="s4-pillars"] .sw-check {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 30px;
        height: 30px;
        border: 2px solid #37bdf8;
        border-radius: 50%;
        font-size: 18px;
      }

      /* PILLAR 3: invoice */
      [data-composition-id="s4-pillars"] .invoice {
        width: 100%;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      [data-composition-id="s4-pillars"] .inv-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 10px 14px;
        background: #0d2031;
        border: 1px solid #252d33;
      }
      [data-composition-id="s4-pillars"] .inv-row.total {
        border-color: #37bdf8;
        background: rgba(55, 189, 248, 0.08);
      }
      [data-composition-id="s4-pillars"] .inv-lbl {
        font-family: "Roboto Mono", monospace;
        font-weight: 500;
        font-size: 15px;
        color: #96a2b6;
        letter-spacing: 0.18em;
      }
      [data-composition-id="s4-pillars"] .inv-val {
        font-family: "Montserrat", sans-serif;
        font-weight: 700;
        font-size: 26px;
        color: #ffffff;
        font-variant-numeric: tabular-nums;
      }
      [data-composition-id="s4-pillars"] .inv-val.accent {
        color: #37bdf8;
        font-size: 36px;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true, defaults: { ease: "power3.out" } });

        const root = '[data-composition-id="s4-pillars"]';

        // Header
        tl.from(root + " .strip", { autoAlpha: 0, y: -14, duration: 0.4, ease: "power3.out" }, 0.1);
        tl.from(root + " .strip-dot", { scale: 0, duration: 0.3, ease: "back.out(2)" }, 0.25);
        tl.from(root + " .headline", { autoAlpha: 0, y: 28, duration: 0.55, ease: "power4.out" }, 0.3);

        // Pillars stagger in
        tl.from(root + " .pillar", {
          autoAlpha: 0,
          y: 70,
          duration: 0.55,
          stagger: 0.18,
          ease: "back.out(1.3)",
        }, 0.7);

        tl.from(root + " .p-idx", { autoAlpha: 0, x: -10, duration: 0.3, stagger: 0.18, ease: "expo.out" }, 0.85);
        tl.from(root + " .p-head", { autoAlpha: 0, y: 22, duration: 0.4, stagger: 0.18, ease: "power4.out" }, 0.95);
        tl.from(root + " .p-sub", { autoAlpha: 0, y: 12, duration: 0.35, stagger: 0.18, ease: "power2.out" }, 1.1);

        // PILLAR 1 — nodes appear and connectors draw
        tl.from(root + " .node.n1", { autoAlpha: 0, scale: 0.8, duration: 0.35, ease: "back.out(1.8)" }, 1.4);
        tl.from(root + " .connector.c12", { scaleY: 0, transformOrigin: "50% 0%", duration: 0.22, ease: "expo.out" }, 1.65);
        tl.from(root + " .node.n2", { autoAlpha: 0, scale: 0.8, duration: 0.35, ease: "back.out(1.8)" }, 1.75);
        tl.from(root + " .connector.c23", { scaleY: 0, transformOrigin: "50% 0%", duration: 0.22, ease: "expo.out" }, 2.0);
        tl.from(root + " .node.n3", { autoAlpha: 0, scale: 0.8, duration: 0.35, ease: "back.out(1.8)" }, 2.1);

        // Pillar 1 node icon pulse
        tl.to(root + " .node .node-icon", {
          scale: 1.15,
          duration: 0.3,
          ease: "sine.inOut",
          stagger: 0.1,
          yoyo: true,
          repeat: 1,
        }, 2.5);

        // PILLAR 2 — deploy bar fills
        tl.from(root + " .ship-window", { autoAlpha: 0, duration: 0.25, ease: "power1.out" }, 1.85);
        tl.to(root + " .sw-fill", { width: "98%", duration: 1.2, ease: "power2.out" }, 1.95);

        // Percentage count-up
        tl.fromTo(root + " .sw-pct",
          { innerText: 0 },
          { innerText: 98, duration: 1.2, snap: { innerText: 1 }, ease: "power2.out",
            onUpdate() {
              const n = Math.round(this.targets()[0].innerText || 0);
              this.targets()[0].innerText = n + "%";
            }
          }, 1.95);

        tl.from(root + " .sw-status", { autoAlpha: 0, scale: 0.7, duration: 0.4, ease: "back.out(2)" }, 3.2);
        tl.fromTo(root + " .sw-check",
          { boxShadow: "0 0 0px rgba(55,189,248,0)" },
          { boxShadow: "0 0 24px rgba(55,189,248,0.9)", duration: 0.4, ease: "power2.out" }, 3.4);

        // PILLAR 3 — invoice rows stack in, values count up
        tl.from(root + " .inv-row", {
          autoAlpha: 0,
          x: 20,
          duration: 0.35,
          stagger: 0.12,
          ease: "expo.out",
        }, 2.25);

        tl.fromTo("#s4-p3-v1", { innerText: 0 }, {
          innerText: 5000, duration: 0.65, snap: { innerText: 1 }, ease: "power2.out",
          onUpdate() { const n = Math.round(this.targets()[0].innerText || 0); this.targets()[0].innerText = n.toLocaleString("en-US"); }
        }, 2.55);
        tl.fromTo("#s4-p3-v2", { innerText: 0 }, {
          innerText: 15000, duration: 0.7, snap: { innerText: 1 }, ease: "power2.out",
          onUpdate() { const n = Math.round(this.targets()[0].innerText || 0); this.targets()[0].innerText = n.toLocaleString("en-US"); }
        }, 2.75);
        tl.fromTo("#s4-p3-v3", { innerText: 0 }, {
          innerText: 20000, duration: 0.85, snap: { innerText: 1 }, ease: "power3.out",
          onUpdate() { const n = Math.round(this.targets()[0].innerText || 0); this.targets()[0].innerText = n.toLocaleString("en-US"); }
        }, 3.0);

        // Final flash: all three pillars briefly pulse their accent
        tl.to(root + " .pillar", {
          borderColor: "#37bdf8",
          duration: 0.25,
          ease: "power2.inOut",
          stagger: 0.08,
          yoyo: true,
          repeat: 1,
        }, 4.0);

        // Pad to 8s
        tl.set({}, {}, 8);

        window.__timelines["s4-pillars"] = tl;
      })();
    </script>
  </div>
</template>
