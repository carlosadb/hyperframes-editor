    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true, defaults: { ease: "power3.out" } });

        const root = '[data-composition-id="s5-cta"]';

        // Ambient backdrop
        tl.from(root + " .backdrop-glow", { autoAlpha: 0, scale: 0.6, duration: 0.9, ease: "power2.out" }, 0.1);
        tl.from(root + " .bd-line", {
          scaleX: 0,
          transformOrigin: "50% 50%",
          duration: 0.6,
          stagger: 0.08,
          ease: "expo.out",
        }, 0.15);

        // Prefix bracket label
        tl.from(root + " .tag-prefix", { autoAlpha: 0, y: -14, duration: 0.4, ease: "power3.out" }, 0.3);
        tl.from(root + " .tag-bracket", {
          autoAlpha: 0,
          scale: 0.3,
          duration: 0.3,
          stagger: 0.08,
          ease: "back.out(2)",
        }, 0.35);

        // Tagline words slam in individually
        tl.from(root + " .tag-word", {
          autoAlpha: 0,
          y: 60,
          scale: 0.9,
          duration: 0.55,
          stagger: 0.12,
          ease: "back.out(1.6)",
        }, 0.55);

        // Accent word extra glow
        tl.fromTo(root + " .tag-word.accent",
          { textShadow: "0 0 0px rgba(55,189,248,0)" },
          { textShadow: "0 0 40px rgba(55,189,248,0.95)", duration: 0.45, ease: "power2.out" }, 1.0);

        // Subtitle
        tl.from(root + " .tag-sub", {
          autoAlpha: 0,
          y: 16,
          duration: 0.5,
          ease: "power2.out",
        }, 1.25);

        // Logo mark
        tl.from(root + " .mark-wrap", {
          autoAlpha: 0,
          scale: 0.5,
          duration: 0.55,
          ease: "back.out(1.6)",
        }, 1.6);

        tl.fromTo(root + " .mark",
          { filter: "drop-shadow(0 0 0px rgba(3,7,255,0))" },
          { filter: "drop-shadow(0 0 60px rgba(3,7,255,0.9))", duration: 0.5, ease: "power2.out" }, 1.85);

        // URL pill
        tl.from(root + " .url-pill", {
          autoAlpha: 0,
          y: 18,
          duration: 0.4,
          ease: "expo.out",
        }, 2.2);
        tl.from(root + " .url-dot", { scale: 0, duration: 0.3, ease: "back.out(2)" }, 2.35);

        // CTA button
        tl.from(root + " .cta-btn", {
          autoAlpha: 0,
          y: 24,
          scale: 0.85,
          duration: 0.5,
          ease: "back.out(1.8)",
        }, 2.55);

        // CTA breathing (2 finite cycles across ~3s)
        tl.to(root + " .cta-btn", {
          scale: 1.035,
          duration: 0.9,
          ease: "sine.inOut",
          repeat: 2,
          yoyo: true,
        }, 3.15);

        // Logo mark subtle breathe
        tl.to(root + " .mark-wrap", {
          scale: 1.04,
          duration: 1.2,
          ease: "sine.inOut",
          repeat: 1,
          yoyo: true,
        }, 3.4);

        // FINAL SCENE ONLY — allowed to fade out
        tl.to(root + " .tag-prefix, " + root + " .tag-sub", {
          autoAlpha: 0.25,
          duration: 0.5,
          ease: "power2.out",
        }, 5.2);

        // Pad to 6s
        tl.set({}, {}, 6);

        window.__timelines["s5-cta"] = tl;
      })();
    </script>

</template>
