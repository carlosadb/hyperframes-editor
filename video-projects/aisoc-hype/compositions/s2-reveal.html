<template id="s2-reveal-template">
  <div data-composition-id="s2-reveal" data-start="0" data-duration="5" data-width="1920" data-height="1080">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;900&family=Roboto+Mono:wght@400;500;700&display=block" />

    <div class="scene">
      <!-- Ambient radial glow behind logo (tightened to stay off text rows) -->
      <div class="glow-bed" aria-hidden="true"></div>
      <div class="glow-ring" aria-hidden="true"></div>
      <div class="glow-ring r2" aria-hidden="true"></div>

      <!-- Techy HUD grid (pans slowly) -->
      <div class="tech-grid" aria-hidden="true"></div>

      <!-- Circuit trace SVG anchored to all four corners -->
      <svg class="traces" viewBox="0 0 1920 1080" preserveAspectRatio="none" aria-hidden="true">
        <polyline class="trace trace-tl" points="60,260 60,140 220,140 220,80" />
        <polyline class="trace trace-tr" points="1860,260 1860,140 1700,140 1700,80" />
        <polyline class="trace trace-bl" points="60,820 60,940 220,940 220,1000" />
        <polyline class="trace trace-br" points="1860,820 1860,940 1700,940 1700,1000" />
        <circle class="trace-node tn-tl" cx="220" cy="80" r="4" />
        <circle class="trace-node tn-tr" cx="1700" cy="80" r="4" />
        <circle class="trace-node tn-bl" cx="220" cy="1000" r="4" />
        <circle class="trace-node tn-br" cx="1700" cy="1000" r="4" />
      </svg>

      <!-- Data telemetry ticker behind top label area -->
      <div class="data-stream" aria-hidden="true">
        0xA4 :: NODE_07 READY  |  0xB1 :: LINK OK  |  0xC9 :: SYNC 100%  |  0xD2 :: AGENT_LOAD 3400  |  0xE7 :: MEMBERS 300K+  |  0xF3 :: TX_HASH 0x7f9e  |  0xA0 :: QUEUE 0  |  0xB8 :: PIPELINE OK  |  0xCC :: DEPLOY 98%  |  0xDE :: HANDSHAKE PASS  |  0xE1 :: CHECKSUM 0x4a
      </div>

      <!-- Horizontal scan beam — one pass during reveal -->
      <div class="scan-beam" aria-hidden="true"></div>

      <!-- Corner mono labels -->
      <div class="corner-mono corner-tr">v1.0.0-ais</div>
      <div class="corner-mono corner-bl">SYS::ONLINE</div>

      <!-- Vertical accent rails -->
      <div class="rail rail-left"></div>
      <div class="rail rail-right"></div>

      <!-- Pulse nodes (8 deterministic dots around the logo) -->
      <div class="nodes" aria-hidden="true">
        <div class="node n1"></div>
        <div class="node n2"></div>
        <div class="node n3"></div>
        <div class="node n4"></div>
        <div class="node n5"></div>
        <div class="node n6"></div>
        <div class="node n7"></div>
        <div class="node n8"></div>
      </div>

      <!-- Orbital particles (deterministic, fixed positions) -->
      <div class="orbit" aria-hidden="true">
        <div class="orb o1"></div>
        <div class="orb o2"></div>
        <div class="orb o3"></div>
        <div class="orb o4"></div>
        <div class="orb o5"></div>
        <div class="orb o6"></div>
      </div>

      <!-- Top label -->
      <div class="top-lbl">
        <span class="bullet"></span>
        <span>INITIALIZING // AI AUTOMATION SOCIETY</span>
      </div>

      <!-- Logo wrapper with 5-piece scatter-and-merge (mask-revealed) -->
      <div class="logo-wrap">
        <img class="logo" src="assets/AIS Logo PNG.png" alt="AIS" />
      </div>

      <!-- Wordmark -->
      <div class="wordmark">
        <span class="wm-piece">AI</span>
        <span class="wm-dot">·</span>
        <span class="wm-piece">AUTOMATION</span>
        <span class="wm-dot">·</span>
        <span class="wm-piece">SOCIETY</span>
      </div>

      <!-- Undertagline -->
      <div class="undertag">
        <span class="line-left"></span>
        <span>MASTER AI AUTOMATION</span>
        <span class="line-right"></span>
      </div>
    </div>

    <style>
      [data-composition-id="s2-reveal"] {
        position: absolute;
        inset: 0;
        background: #07121c;
        color: #ffffff;
        font-family: "Montserrat", sans-serif;
        overflow: hidden;
      }
      [data-composition-id="s2-reveal"] .scene {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 44px;
        padding: 120px;
        box-sizing: border-box;
      }
      [data-composition-id="s2-reveal"] .glow-bed {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 720px;
        height: 720px;
        margin-top: -360px;
        margin-left: -360px;
        background: radial-gradient(circle, rgba(55, 189, 248, 0.18) 0%, rgba(3, 7, 255, 0.10) 25%, rgba(7, 18, 28, 0) 48%);
        pointer-events: none;
        z-index: 0;
      }
      [data-composition-id="s2-reveal"] .glow-ring {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 300px;
        height: 300px;
        margin-top: -150px;
        margin-left: -150px;
        border-radius: 50%;
        border: 2px solid rgba(55, 189, 248, 0.6);
        pointer-events: none;
      }
      [data-composition-id="s2-reveal"] .glow-ring.r2 {
        width: 480px;
        height: 480px;
        margin-top: -240px;
        margin-left: -240px;
        border-color: rgba(55, 189, 248, 0.15);
      }
      [data-composition-id="s2-reveal"] .rail {
        position: absolute;
        top: 180px;
        bottom: 180px;
        width: 1.5px;
        background: linear-gradient(180deg, rgba(55, 189, 248, 0) 0%, rgba(55, 189, 248, 0.45) 30%, rgba(55, 189, 248, 0.45) 70%, rgba(55, 189, 248, 0) 100%);
      }
      [data-composition-id="s2-reveal"] .rail-left { left: 180px; }
      [data-composition-id="s2-reveal"] .rail-right { right: 180px; }

      [data-composition-id="s2-reveal"] .orbit {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 640px;
        height: 640px;
        margin-top: -320px;
        margin-left: -320px;
        pointer-events: none;
      }
      [data-composition-id="s2-reveal"] .orb {
        position: absolute;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #37bdf8;
        box-shadow: 0 0 18px rgba(55, 189, 248, 0.9);
      }
      [data-composition-id="s2-reveal"] .o1 { top: 0;    left: 320px; }
      [data-composition-id="s2-reveal"] .o2 { top: 90px;  left: 560px; }
      [data-composition-id="s2-reveal"] .o3 { top: 420px; left: 620px; }
      [data-composition-id="s2-reveal"] .o4 { top: 620px; left: 320px; }
      [data-composition-id="s2-reveal"] .o5 { top: 420px; left: 20px;  }
      [data-composition-id="s2-reveal"] .o6 { top: 90px;  left: 80px;  }

      [data-composition-id="s2-reveal"] .top-lbl {
        font-family: "Roboto Mono", monospace;
        font-weight: 500;
        font-size: 20px;
        color: #37bdf8;
        letter-spacing: 0.22em;
        display: flex;
        align-items: center;
        gap: 16px;
        position: relative;
        z-index: 3;
        text-shadow: 0 0 18px rgba(7, 18, 28, 0.95), 0 1px 2px rgba(0, 0, 0, 0.7);
      }
      [data-composition-id="s2-reveal"] .bullet {
        width: 12px;
        height: 12px;
        background: #37bdf8;
        border-radius: 50%;
        box-shadow: 0 0 12px rgba(55, 189, 248, 0.95);
      }

      [data-composition-id="s2-reveal"] .logo-wrap {
        width: 360px;
        height: 360px;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 2;
      }
      [data-composition-id="s2-reveal"] .logo {
        width: 100%;
        height: 100%;
        object-fit: contain;
        filter: drop-shadow(0 0 50px rgba(3, 7, 255, 0.75));
      }

      [data-composition-id="s2-reveal"] .wordmark {
        display: flex;
        align-items: center;
        gap: 22px;
        font-family: "Montserrat", sans-serif;
        font-weight: 700;
        font-size: 58px;
        letter-spacing: 0.04em;
        color: #ffffff;
        position: relative;
        z-index: 3;
        text-shadow: 0 0 24px rgba(7, 18, 28, 0.95), 0 2px 6px rgba(0, 0, 0, 0.7);
      }
      [data-composition-id="s2-reveal"] .wm-piece {
        display: inline-block;
      }
      [data-composition-id="s2-reveal"] .wm-dot {
        color: #37bdf8;
        font-size: 50px;
        line-height: 1;
      }

      [data-composition-id="s2-reveal"] .undertag {
        display: flex;
        align-items: center;
        gap: 18px;
        font-family: "Roboto Mono", monospace;
        font-weight: 600;
        font-size: 22px;
        color: #c5d1e3;
        letter-spacing: 0.32em;
        position: relative;
        z-index: 3;
        text-shadow: 0 0 18px rgba(7, 18, 28, 0.95), 0 1px 2px rgba(0, 0, 0, 0.7);
      }
      [data-composition-id="s2-reveal"] .line-left,
      [data-composition-id="s2-reveal"] .line-right {
        display: inline-block;
        width: 80px;
        height: 1.5px;
        background: #37bdf8;
        opacity: 0.7;
      }

      /* ---------- Tech HUD grid (slow pan) ---------- */
      [data-composition-id="s2-reveal"] .tech-grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(55, 189, 248, 0.07) 1px, rgba(55, 189, 248, 0) 1px),
          linear-gradient(90deg, rgba(55, 189, 248, 0.07) 1px, rgba(55, 189, 248, 0) 1px);
        background-size: 60px 60px, 60px 60px;
        background-position: 0 0, 0 0;
        mask-image: radial-gradient(ellipse at center, rgba(0,0,0,1) 0%, rgba(0,0,0,0.85) 45%, rgba(0,0,0,0.25) 80%);
        -webkit-mask-image: radial-gradient(ellipse at center, rgba(0,0,0,1) 0%, rgba(0,0,0,0.85) 45%, rgba(0,0,0,0.25) 80%);
        pointer-events: none;
        z-index: 0;
      }

      /* ---------- Circuit traces ---------- */
      [data-composition-id="s2-reveal"] .traces {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 1;
      }
      [data-composition-id="s2-reveal"] .trace {
        fill: none;
        stroke: #37bdf8;
        stroke-width: 1.5;
        stroke-opacity: 0.45;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      [data-composition-id="s2-reveal"] .trace-node {
        fill: #37bdf8;
        filter: drop-shadow(0 0 6px rgba(55, 189, 248, 0.9));
      }

      /* ---------- Data telemetry ticker ---------- */
      [data-composition-id="s2-reveal"] .data-stream {
        position: absolute;
        top: 96px;
        left: 0;
        width: 3200px;
        font-family: "Roboto Mono", monospace;
        font-weight: 500;
        font-size: 14px;
        letter-spacing: 0.18em;
        color: #37bdf8;
        opacity: 0.22;
        white-space: nowrap;
        pointer-events: none;
        z-index: 1;
      }

      /* ---------- Horizontal scan beam (one pass) ---------- */
      [data-composition-id="s2-reveal"] .scan-beam {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 3px;
        background: linear-gradient(90deg, rgba(55, 189, 248, 0) 0%, rgba(55, 189, 248, 0.75) 50%, rgba(55, 189, 248, 0) 100%);
        box-shadow: 0 0 24px rgba(55, 189, 248, 0.55);
        pointer-events: none;
        z-index: 1;
        transform: translateY(-60px);
      }

      /* ---------- Corner mono labels ---------- */
      [data-composition-id="s2-reveal"] .corner-mono {
        position: absolute;
        font-family: "Roboto Mono", monospace;
        font-weight: 500;
        font-size: 12px;
        letter-spacing: 0.24em;
        color: #37bdf8;
        opacity: 0.55;
        z-index: 2;
      }
      [data-composition-id="s2-reveal"] .corner-tr { top: 60px;  right: 240px; }
      [data-composition-id="s2-reveal"] .corner-bl { bottom: 60px; left: 240px; }

      /* ---------- Pulse nodes ---------- */
      [data-composition-id="s2-reveal"] .nodes {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 1;
      }
      [data-composition-id="s2-reveal"] .node {
        position: absolute;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #37bdf8;
        box-shadow: 0 0 10px rgba(55, 189, 248, 0.85);
      }
      [data-composition-id="s2-reveal"] .n1 { top: 260px;  left: 420px;  }
      [data-composition-id="s2-reveal"] .n2 { top: 240px;  left: 1480px; }
      [data-composition-id="s2-reveal"] .n3 { top: 780px;  left: 360px;  }
      [data-composition-id="s2-reveal"] .n4 { top: 800px;  left: 1520px; }
      [data-composition-id="s2-reveal"] .n5 { top: 180px;  left: 960px;  }
      [data-composition-id="s2-reveal"] .n6 { top: 900px;  left: 960px;  }
      [data-composition-id="s2-reveal"] .n7 { top: 520px;  left: 300px;  }
      [data-composition-id="s2-reveal"] .n8 { top: 520px;  left: 1600px; }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        window.__timelines = window.__timelines || {};
        const tl = gsap.timeline({ paused: true, defaults: { ease: "power3.out" } });

        const root = '[data-composition-id="s2-reveal"]';

        // BEAT 0 (0.05-1.1s): Techy HUD boots up behind everything
        // Grid fades in
        tl.from(root + " .tech-grid", {
          autoAlpha: 0,
          duration: 0.8,
          ease: "power1.out",
        }, 0.1);

        // Circuit traces draw in from anchor → corner node
        tl.set(root + " .trace", { strokeDasharray: 340, strokeDashoffset: 340 }, 0);
        tl.to(root + " .trace-tl, " + root + " .trace-br", {
          strokeDashoffset: 0,
          duration: 0.7,
          ease: "power3.out",
        }, 0.15);
        tl.to(root + " .trace-tr, " + root + " .trace-bl", {
          strokeDashoffset: 0,
          duration: 0.7,
          ease: "power3.out",
        }, 0.35);

        // Trace-end nodes light up after the lines arrive
        tl.from(root + " .trace-node", {
          autoAlpha: 0,
          scale: 0,
          transformOrigin: "50% 50%",
          duration: 0.35,
          stagger: 0.08,
          ease: "back.out(2.2)",
        }, 0.85);

        // Pulse nodes around the logo zone
        tl.from(root + " .node", {
          scale: 0,
          autoAlpha: 0,
          transformOrigin: "50% 50%",
          duration: 0.45,
          stagger: { each: 0.06, from: "random" },
          ease: "back.out(1.8)",
        }, 0.6);

        // Horizontal scan beam — single top-to-bottom pass
        tl.fromTo(root + " .scan-beam",
          { y: -60, autoAlpha: 0 },
          { y: 1140, autoAlpha: 1, duration: 2.2, ease: "power2.inOut" },
          0.8
        );
        tl.to(root + " .scan-beam", { autoAlpha: 0, duration: 0.25 }, 2.9);

        // Data telemetry ticker scrolls leftward (single run, constant speed)
        tl.fromTo(root + " .data-stream",
          { x: 200, autoAlpha: 0 },
          { autoAlpha: 0.22, duration: 0.4, ease: "power1.out" },
          0.9
        );
        tl.to(root + " .data-stream", { x: -1600, duration: 5.0, ease: "none" }, 0.9);

        // Corner mono labels
        tl.from(root + " .corner-tr", {
          autoAlpha: 0,
          y: -10,
          duration: 0.4,
          ease: "power2.out",
        }, 1.1);
        tl.from(root + " .corner-bl", {
          autoAlpha: 0,
          y: 10,
          duration: 0.4,
          ease: "power2.out",
        }, 1.25);

        // Grid slow pan drift — one smooth sweep during the reveal
        tl.to(root + " .tech-grid", {
          backgroundPosition: "60px 60px, 60px 60px",
          duration: 4.5,
          ease: "sine.inOut",
        }, 0.9);

        // Pulse nodes breathe softly once mid-scene
        tl.to(root + " .node", {
          scale: 1.35,
          duration: 0.55,
          ease: "sine.inOut",
          stagger: 0.05,
          repeat: 1,
          yoyo: true,
        }, 2.6);

        // BEAT 1 (0.1-2.5s): Glow bed, rings, rails, particles build the frame
        tl.from(root + " .glow-bed", {
          autoAlpha: 0,
          scale: 0.6,
          duration: 0.8,
          ease: "power2.out",
        }, 0.1);

        tl.from(root + " .rail-left", { scaleY: 0, duration: 0.5, transformOrigin: "50% 50%", ease: "power4.out" }, 0.2);
        tl.from(root + " .rail-right", { scaleY: 0, duration: 0.5, transformOrigin: "50% 50%", ease: "power4.out" }, 0.25);

        tl.from(root + " .glow-ring", {
          autoAlpha: 0,
          scale: 0.1,
          duration: 0.7,
          ease: "expo.out",
        }, 0.35);

        tl.from(root + " .glow-ring.r2", {
          autoAlpha: 0,
          scale: 0.1,
          duration: 0.9,
          ease: "expo.out",
        }, 0.5);

        // Particles scatter in from center
        tl.from(root + " .orb", {
          autoAlpha: 0,
          scale: 0,
          x: (i) => (i % 2 === 0 ? -60 : 60),
          y: (i) => (i < 3 ? -30 : 30),
          duration: 0.55,
          stagger: { each: 0.04, from: "random" },
          ease: "back.out(1.8)",
        }, 0.4);

        // BEAT 2 (1.0-3.0s): Logo reveal — scatter-in pieces via transform + glow pulse
        tl.from(root + " .logo", {
          autoAlpha: 0,
          scale: 0.2,
          rotation: -25,
          duration: 0.9,
          ease: "back.out(1.4)",
        }, 1.0);

        // Logo glow pulse
        tl.fromTo(root + " .logo",
          { filter: "drop-shadow(0 0 0px rgba(3,7,255,0))" },
          { filter: "drop-shadow(0 0 80px rgba(3,7,255,0.95))", duration: 0.55, ease: "power2.out" }, 1.5);

        tl.to(root + " .logo", {
          filter: "drop-shadow(0 0 50px rgba(3,7,255,0.75))",
          duration: 0.5,
          ease: "power2.inOut",
        }, 2.1);

        // Top label
        tl.from(root + " .top-lbl", {
          autoAlpha: 0,
          y: -24,
          duration: 0.4,
          ease: "power3.out",
        }, 1.9);

        tl.from(root + " .bullet", {
          scale: 0,
          duration: 0.35,
          ease: "back.out(2.2)",
        }, 2.0);

        // BEAT 3 (2.5-5.0s): Wordmark types in, undertag glides
        tl.from(root + " .wm-piece", {
          autoAlpha: 0,
          y: 34,
          duration: 0.45,
          stagger: 0.08,
          ease: "expo.out",
        }, 2.5);

        tl.from(root + " .wm-dot", {
          autoAlpha: 0,
          scale: 0.3,
          duration: 0.35,
          stagger: 0.08,
          ease: "back.out(2)",
        }, 2.7);

        tl.from(root + " .undertag", {
          autoAlpha: 0,
          y: 14,
          duration: 0.5,
          ease: "power2.out",
        }, 3.0);

        tl.from(root + " .line-left", {
          scaleX: 0,
          duration: 0.45,
          transformOrigin: "100% 50%",
          ease: "expo.out",
        }, 3.15);

        tl.from(root + " .line-right", {
          scaleX: 0,
          duration: 0.45,
          transformOrigin: "0% 50%",
          ease: "expo.out",
        }, 3.15);

        // Ambient: orbs breathe and rings rotate subtly
        tl.to(root + " .orb", {
          scale: 1.18,
          duration: 0.9,
          ease: "sine.inOut",
          repeat: 1,
          yoyo: true,
          stagger: 0.05,
        }, 3.6);

        tl.to(root + " .glow-ring", {
          rotation: 18,
          duration: 1.2,
          ease: "sine.inOut",
        }, 3.8);

        // Pad to 5s
        tl.set({}, {}, 5);

        window.__timelines["s2-reveal"] = tl;
      })();
    </script>
  </div>
</template>
