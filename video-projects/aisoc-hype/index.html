<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <title>AI Automation Society — 30s Brand Hype Film</title>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;900&family=Roboto+Mono:wght@400;500;700&display=block"
    />
    <link rel="stylesheet" href="assets/brand-tokens.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background: #07121c;
        font-family: "Montserrat", sans-serif;
        color: #ffffff;
      }
      [data-composition-id="aisoc-hype"] {
        position: relative;
        width: 1920px;
        height: 1080px;
        background: #07121c;
        overflow: hidden;
      }
      /* Background color always underneath scenes */
      [data-composition-id="aisoc-hype"] .bg {
        position: absolute;
        inset: 0;
        background: #07121c;
        z-index: 0;
      }
      /* Scene wrappers stack on top, transitions modulate their opacity/scale */
      [data-composition-id="aisoc-hype"] .scene-wrap {
        position: absolute;
        inset: 0;
        z-index: 1;
        will-change: transform, opacity;
      }
      /* Grain overlay (pasted from component) sits above everything */
      [data-composition-id="aisoc-hype"] #grain-overlay {
        z-index: 100;
      }

      /* ----- grain-overlay component styles (inlined from compositions/components/grain-overlay.html) ----- */
      @keyframes hf-grain-noise {
        0%, 100% { transform: translate(0, 0); }
        10% { transform: translate(-5%, -5%); }
        20% { transform: translate(-10%, 5%); }
        30% { transform: translate(5%, -10%); }
        40% { transform: translate(-5%, 15%); }
        50% { transform: translate(-10%, 5%); }
        60% { transform: translate(15%, 0); }
        70% { transform: translate(0, 10%); }
        80% { transform: translate(-15%, 0); }
        90% { transform: translate(10%, 5%); }
      }
      [data-composition-id="aisoc-hype"] #grain-overlay .grain-texture {
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        opacity: 0.08;
        animation: hf-grain-noise 0.5s steps(1) infinite;
      }
    </style>
  </head>
  <body>
    <div
      id="aisoc-hype"
      data-composition-id="aisoc-hype"
      data-start="0"
      data-duration="30"
      data-width="1920"
      data-height="1080"
    >
      <!-- Solid bg pedestal -->
      <div class="bg"></div>

      <!-- Scene 1 — Hook (0.0–5.3s) -->
      <div
        id="scene-1"
        class="scene-wrap"
        data-composition-id="s1-hook"
        data-composition-src="compositions/s1-hook.html"
        data-start="0"
        data-duration="5.3"
        data-track-index="1"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Scene 2 — Brand Reveal (4.95–10.3s) — overlaps s1 by 0.35s -->
      <div
        id="scene-2"
        class="scene-wrap"
        data-composition-id="s2-reveal"
        data-composition-src="compositions/s2-reveal.html"
        data-start="4.95"
        data-duration="5.35"
        data-track-index="2"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Scene 3 — Social Proof (9.95–16.3s) — overlaps s2 by 0.35s -->
      <div
        id="scene-3"
        class="scene-wrap"
        data-composition-id="s3-proof"
        data-composition-src="compositions/s3-proof.html"
        data-start="9.95"
        data-duration="6.35"
        data-track-index="3"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Scene 4 — Pillars (15.95–24.3s) — overlaps s3 by 0.35s -->
      <div
        id="scene-4"
        class="scene-wrap"
        data-composition-id="s4-pillars"
        data-composition-src="compositions/s4-pillars.html"
        data-start="15.95"
        data-duration="8.35"
        data-track-index="4"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Scene 5 — Tagline + CTA (23.5–30.0s) — overlaps s4 by 0.8s (blur crossfade) -->
      <div
        id="scene-5"
        class="scene-wrap"
        data-composition-id="s5-cta"
        data-composition-src="compositions/s5-cta.html"
        data-start="23.5"
        data-duration="6.5"
        data-track-index="5"
        data-width="1920"
        data-height="1080"
      ></div>

      <!-- Grain overlay runs the whole composition -->
      <div
        id="grain-overlay"
        style="
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
          pointer-events: none;
        "
      >
        <div class="grain-texture"></div>
      </div>

      <!-- Music bed — Epic Inspirational Hip-Hop (Infraction, No Copyright Music) -->
      <audio
        id="music"
        data-start="0"
        data-duration="30"
        data-track-index="0"
        src="assets/music.mp3"
        data-volume="0.7"
      ></audio>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        (function () {
          window.__timelines = window.__timelines || {};
          const tl = gsap.timeline({ paused: true });

          // ---------- SCENE TRANSITIONS ----------
          // Rule: transitions ARE the exits. Each outgoing scene's wrapper fades/transforms at the boundary.
          // Incoming scenes are placed with data-start overlapping the outgoing by the transition duration.

          // Transition 1 → 2: Zoom-through (dramatic opener) — 0.35s power4.inOut
          tl.set("#scene-1", { autoAlpha: 1, scale: 1 }, 0);
          tl.to("#scene-1", { autoAlpha: 0, scale: 1.25, duration: 0.35, ease: "power4.inOut" }, 4.95);
          tl.fromTo(
            "#scene-2",
            { autoAlpha: 0, scale: 0.8 },
            { autoAlpha: 1, scale: 1, duration: 0.35, ease: "power4.inOut" },
            4.95
          );

          // Transition 2 → 3: Push-slide left (editorial) — 0.35s power2.inOut
          tl.to("#scene-2", { autoAlpha: 0, xPercent: -18, duration: 0.35, ease: "power2.inOut" }, 9.95);
          tl.fromTo(
            "#scene-3",
            { autoAlpha: 0, xPercent: 18 },
            { autoAlpha: 1, xPercent: 0, duration: 0.35, ease: "power2.inOut" },
            9.95
          );

          // Transition 3 → 4: Push-slide left (consistent primary) — 0.35s power2.inOut
          tl.to("#scene-3", { autoAlpha: 0, xPercent: -18, duration: 0.35, ease: "power2.inOut" }, 15.95);
          tl.fromTo(
            "#scene-4",
            { autoAlpha: 0, xPercent: 18 },
            { autoAlpha: 1, xPercent: 0, duration: 0.35, ease: "power2.inOut" },
            15.95
          );

          // Transition 4 → 5: Blur crossfade (wind-down into CTA) — 0.6s sine.inOut
          tl.to(
            "#scene-4",
            { autoAlpha: 0, filter: "blur(16px)", scale: 1.05, duration: 0.6, ease: "sine.inOut" },
            23.5
          );
          tl.fromTo(
            "#scene-5",
            { autoAlpha: 0, filter: "blur(16px)", scale: 0.96 },
            { autoAlpha: 1, filter: "blur(0px)", scale: 1, duration: 0.6, ease: "sine.inOut" },
            23.5
          );

          // Ensure final scene stays visible at 30s
          tl.set("#scene-5", { autoAlpha: 1 }, 29.9);

          // Pad to exactly 30s
          tl.set({}, {}, 30);

          window.__timelines["aisoc-hype"] = tl;
        })();
      </script>
    </div>
  </body>
</html>
